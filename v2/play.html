<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game — Play</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }
      canvas {
        display: block;
      }
      /* Boot / loading + error overlay. Hidden once the world is playing. */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        font-family: system-ui, -apple-system, sans-serif;
        color: #cfcfcf;
        background: #0a0a0a;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #boot.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot .spinner {
        width: 34px;
        height: 34px;
        border: 3px solid #333;
        border-top-color: #6ab0ff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #boot .msg {
        font-size: 14px;
        letter-spacing: 0.02em;
      }
      #boot .err {
        max-width: 640px;
        padding: 12px 16px;
        font-size: 13px;
        line-height: 1.5;
        color: #ff8c8c;
        background: #1c0f0f;
        border: 1px solid #532;
        border-radius: 6px;
        white-space: pre-wrap;
        display: none;
      }
      /* "Click to Play" gate. A real user gesture is required before the
         browser will grant Pointer Lock, so we can't auto-enter play. */
      #play-btn {
        display: none;
        padding: 14px 34px;
        font: 600 16px/1 system-ui, sans-serif;
        letter-spacing: 0.04em;
        color: #eee;
        background: #2563aa;
        border: 1px solid #6ab0ff;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      #play-btn:hover {
        background: #2f74c8;
      }
      #boot .hint {
        font-size: 12px;
        color: #888;
      }
      /* Load-from-disk: pick or drag-drop a .v2terrain world. */
      #loader {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      #dropzone {
        width: 340px;
        padding: 26px 20px;
        text-align: center;
        font-size: 13px;
        color: #9aa3b2;
        background: #12161f;
        border: 1.5px dashed #39435a;
        border-radius: 10px;
        cursor: pointer;
        transition:
          border-color 0.15s ease,
          background 0.15s ease,
          color 0.15s ease;
      }
      #dropzone:hover,
      #dropzone.drag {
        border-color: #6ab0ff;
        background: #16202e;
        color: #cfe2ff;
      }
      #dropzone b {
        color: #cfe2ff;
        font-weight: 600;
      }
      #loader .or {
        font-size: 11px;
        letter-spacing: 0.08em;
        color: #5a6477;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="spinner" id="boot-spinner"></div>
      <div class="msg" id="boot-msg">Loading engine…</div>
      <button id="play-btn">▶ Click to Play</button>
      <div class="hint" id="boot-hint" style="display: none">
        Mouse to look · WASD to move · Esc to release the cursor
      </div>
      <div id="loader">
        <div id="dropzone">
          <b>Drop a .v2terrain world here</b><br />or click to choose a file
        </div>
        <div class="or">or</div>
        <button id="default-btn" class="play-btn-secondary" style="
            padding: 9px 20px;
            font: 600 13px/1 system-ui, sans-serif;
            color: #cfe2ff;
            background: transparent;
            border: 1px solid #39435a;
            border-radius: 7px;
            cursor: pointer;
          ">
          Load the default world
        </button>
      </div>
      <input id="file-input" type="file" accept=".v2terrain" hidden />
      <div class="err" id="boot-err"></div>
    </div>

    <script type="module">
      import { startV2App } from "./app/main.js";

      // The world to play. Provide one explicitly with ?scene=/my-world.v2terrain
      // (a file in /public, served at the web root). With no ?scene param, the
      // player shows a loader so you can drop / pick a .v2terrain from disk or
      // load the bundled default.
      const params = new URLSearchParams(location.search);
      const SCENE_URL = params.get("scene"); // null when not provided
      const DEFAULT_SCENE = "/scene.v2terrain";

      const bootEl = document.getElementById("boot");
      const msgEl = document.getElementById("boot-msg");
      const errEl = document.getElementById("boot-err");
      const spinnerEl = document.getElementById("boot-spinner");
      const playBtn = document.getElementById("play-btn");
      const hintEl = document.getElementById("boot-hint");
      const loaderEl = document.getElementById("loader");
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("file-input");
      const defaultBtn = document.getElementById("default-btn");

      const setMsg = (t) => {
        msgEl.textContent = t;
      };
      const showErr = (label, e) => {
        console.error(`[PLAY] ${label}`, e);
        errEl.style.display = "block";
        errEl.textContent = `${label}\n\n${e?.stack || e?.message || e}`;
      };

      let app;

      const showLoader = (msg = "Choose a world") => {
        spinnerEl.style.display = "none";
        playBtn.style.display = "none";
        hintEl.style.display = "none";
        loaderEl.style.display = "flex";
        setMsg(msg);
      };

      // World is ready → show "Click to Play" (Pointer Lock needs a gesture).
      const showReady = () => {
        spinnerEl.style.display = "none";
        loaderEl.style.display = "none";
        errEl.style.display = "none";
        setMsg("Ready");
        playBtn.style.display = "inline-block";
        hintEl.style.display = "block";
      };

      // Run a world-load action with a spinner; fall back to the loader on error.
      const withLoading = async (msg, fn) => {
        errEl.style.display = "none";
        loaderEl.style.display = "none";
        spinnerEl.style.display = "block";
        setMsg(msg);
        try {
          await fn();
          showReady();
        } catch (e) {
          showErr("Couldn't load that world.", e);
          showLoader("Choose a world");
        }
      };

      const loadUrl = (url) =>
        withLoading("Loading world…", () => app.loadProjectFromUrl(url));
      const loadFile = (file) =>
        withLoading("Loading world…", async () => {
          const buf = await file.arrayBuffer();
          await app.loadProjectBuffer(buf);
        });

      // Entering immersive play must happen inside a user gesture (Pointer Lock).
      playBtn.addEventListener("click", () => {
        app.setMode("play", { immersive: true });
        bootEl.classList.add("hidden");
        setTimeout(() => bootEl.remove(), 600);
      });

      // --- Loader wiring (file picker + drag & drop) ---
      dropzone.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        const f = fileInput.files?.[0];
        if (f) loadFile(f);
      });
      defaultBtn.addEventListener("click", () => loadUrl(DEFAULT_SCENE));
      ["dragenter", "dragover"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          dropzone.classList.add("drag");
        }),
      );
      ["dragleave", "drop"].forEach((ev) =>
        dropzone.addEventListener(ev, (e) => {
          e.preventDefault();
          dropzone.classList.remove("drag");
        }),
      );
      dropzone.addEventListener("drop", (e) => {
        const f = e.dataTransfer?.files?.[0];
        if (f) loadFile(f);
      });
      // Allow dropping a file anywhere on the boot overlay, not just the box.
      ["dragover", "drop"].forEach((ev) =>
        bootEl.addEventListener(ev, (e) => e.preventDefault()),
      );

      // --- Boot ---
      try {
        setMsg("Starting renderer…");
        app = await startV2App();
        window.__app = app; // for debugging in the console

        if (SCENE_URL) {
          await loadUrl(SCENE_URL); // explicit world → load straight in
        } else {
          showLoader(); // no world specified → let the player choose
        }
      } catch (e) {
        showErr("Failed to start the renderer.", e);
        setMsg("Failed to start.");
        spinnerEl.style.display = "none";
      }
    </script>
  </body>
</html>
