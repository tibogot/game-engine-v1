<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Engine</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        font-family: system-ui, -apple-system, sans-serif;
        color: #e8e8e8;
        background: radial-gradient(circle at 50% 30%, #1c2230, #0a0a0c);
      }
      h1 {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      .links {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        justify-content: center;
      }
      a.card {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 220px;
        padding: 22px 24px;
        text-decoration: none;
        color: #eee;
        background: #161b26;
        border: 1px solid #2c3445;
        border-radius: 12px;
        transition:
          transform 0.12s ease,
          border-color 0.12s ease;
      }
      a.card:hover {
        transform: translateY(-3px);
        border-color: #6ab0ff;
      }
      a.card .t {
        font-size: 18px;
        font-weight: 600;
      }
      a.card .d {
        font-size: 13px;
        color: #9aa3b2;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>Game Engine</h1>
    <div class="links">
      <a class="card" href="/v2/play.html">
        <span class="t">▶ Play</span>
        <span class="d">Run the deployed game (no editor).</span>
      </a>
      <a class="card" href="/v2/editor.html">
        <span class="t">✎ Editor</span>
        <span class="d">Build and edit worlds.</span>
      </a>
    </div>
  </body>
</html>
