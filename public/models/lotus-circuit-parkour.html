<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.webgpu.js",
          "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.tsl.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/",
          "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.9.9/build/index.module.js",
          "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20.0/dist/lil-gui.esm.min.js",
          "howler": "https://esm.sh/howler@2.2.4"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud">Loading…</div>
    <div id="ui">
      <strong>lotusrealsize2.glb</strong> — BVH physics test track. Compare with
      <a href="./lotus-circuit-parkour-rapier.html">Rapier version</a>.<br />
      <kbd>WASD</kbd> drive · <kbd>Shift</kbd> boost ·
      <kbd>Space</kbd> handbrake · <kbd>R</kbd> respawn · <kbd>L</kbd> rig log ·
      <kbd>Tab</kbd> / <kbd>O</kbd> orbit<br />
      <strong>Slope lab</strong> (north): 11 ramps 5°–55°.
      <strong>Bridges</strong> (east/west): straight vs curved ramps. Jump ramp
      south of spawn. Tall perimeter walls.
    </div>
    <script type="module">
      import * as THREE from "three/webgpu";
      import { acceleratedRaycast } from "three-mesh-bvh";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { SkyMesh } from "three/addons/objects/SkyMesh.js";
      import GUI from "lil-gui";
      import { Howl, Howler } from "howler";
      import {
        createTileMaterial,
        setGridTextureUrl,
      } from "../../v2/core/legacy/tileMaterial.js";
      // v2 BVH + Lotus defaults — read-only. Parkour-specific physics overrides
      // live in parkourCarPhysics.js (never modify v2/play/carPhysics.js).
      import { CliffBvh } from "../v2/core/cliffs/cliffBvh.js";
      import {
        ParkourCarPhysics,
        DEFAULT_LOTUS_COLLISION_HULL,
        DEFAULT_LOTUS_CHASSIS,
      } from "./parkourCarPhysics.js";

      setGridTextureUrl(new URL("../textures/grid.png", import.meta.url).href);

      THREE.Mesh.prototype.raycast = acceleratedRaycast;

      const DRIFT_ANGLE_MIN = 0.1;
      let _handbrakeBlend = 0;
      const DRIFT_MARK_MAX_SEGMENTS = 4096;
      const DRIFT_MARK_VERTS_PER_SEGMENT = 6;
      const DRIFT_MARK_FLOATS_PER_SEGMENT = DRIFT_MARK_VERTS_PER_SEGMENT * 3;
      const DRIFT_MARK_COLOR_FLOATS_PER_SEGMENT =
        DRIFT_MARK_VERTS_PER_SEGMENT * 4;
      const DRIFT_MARK_WIDTH = 0.09;
      const DRIFT_MARK_Y_OFFSET = 0.045;
      const DRIFT_MARK_MIN_SEGMENT_LENGTH = 0.035;
      const DRIFT_MARK_INTENSITY_MIN = 0.15;
      const DRIFT_MARK_INTENSITY_MAX = 0.9;
      const DRIFT_MARK_INV_INTENSITY_RANGE =
        1 / (DRIFT_MARK_INTENSITY_MAX - DRIFT_MARK_INTENSITY_MIN);

      const _dmDir = new THREE.Vector3();
      const _dmSide = new THREE.Vector3();
      const _dmPL = new THREE.Vector3();
      const _dmPR = new THREE.Vector3();
      const _dmCL = new THREE.Vector3();
      const _dmCR = new THREE.Vector3();

      class DriftMarks {
        constructor(scene) {
          const positions = new Float32Array(
            DRIFT_MARK_MAX_SEGMENTS * DRIFT_MARK_FLOATS_PER_SEGMENT,
          );
          const colors = new Float32Array(
            DRIFT_MARK_MAX_SEGMENTS * DRIFT_MARK_COLOR_FLOATS_PER_SEGMENT,
          );
          for (let i = 0; i < DRIFT_MARK_VERTS_PER_SEGMENT; i++) {
            const o = i * 4;
            colors[o] = colors[o + 1] = colors[o + 2] = 1;
          }
          const geometry = new THREE.BufferGeometry();
          const posAttr = new THREE.BufferAttribute(positions, 3);
          posAttr.setUsage(THREE.DynamicDrawUsage);
          geometry.setAttribute("position", posAttr);
          const colorAttr = new THREE.BufferAttribute(colors, 4);
          colorAttr.setUsage(THREE.DynamicDrawUsage);
          geometry.setAttribute("color", colorAttr);
          geometry.setDrawRange(0, 0);
          this.mesh = new THREE.Mesh(
            geometry,
            new THREE.MeshBasicMaterial({
              color: 0x111111,
              transparent: true,
              vertexColors: true,
              depthWrite: false,
              side: THREE.DoubleSide,
              polygonOffset: true,
              polygonOffsetFactor: -4,
              polygonOffsetUnits: -4,
            }),
          );
          this.mesh.frustumCulled = false;
          this.mesh.renderOrder = 20;
          this.mesh.visible = false;
          scene.add(this.mesh);
          this.positions = positions;
          this.colors = colors;
          this.geometry = geometry;
          this.segmentIndex = 0;
          this.drawCount = 0;
          this.states = [
            { prev: new THREE.Vector3(), active: false },
            { prev: new THREE.Vector3(), active: false },
          ];
        }
        reset() {
          this.segmentIndex = 0;
          this.drawCount = 0;
          this.geometry.setDrawRange(0, 0);
          this.mesh.visible = false;
          this.states[0].active = false;
          this.states[1].active = false;
        }
        update(rearPoints, emit, intensity, rearGrounded = null) {
          const e0 = emit && (!rearGrounded || rearGrounded[0]);
          const e1 = emit && (!rearGrounded || rearGrounded[1]);
          this._track(rearPoints[0], e0, intensity, this.states[0]);
          this._track(rearPoints[1], e1, intensity, this.states[1]);
        }
        _track(point, emit, intensity, state) {
          if (!point) {
            state.active = false;
            return;
          }
          if (emit && state.active)
            this._addSegment(state.prev, point, intensity);
          state.prev.copy(point);
          state.active = emit;
        }
        _addSegment(prev, curr, intensity) {
          _dmDir.subVectors(curr, prev);
          _dmDir.y = 0;
          const len = _dmDir.length();
          if (len < DRIFT_MARK_MIN_SEGMENT_LENGTH) return;
          _dmDir.divideScalar(len);
          _dmSide.set(_dmDir.z, 0, -_dmDir.x).multiplyScalar(DRIFT_MARK_WIDTH);
          _dmPL.copy(prev).add(_dmSide);
          _dmPR.copy(prev).sub(_dmSide);
          _dmCL.copy(curr).add(_dmSide);
          _dmCR.copy(curr).sub(_dmSide);
          const offset = this.segmentIndex * DRIFT_MARK_FLOATS_PER_SEGMENT;
          const p = this.positions;
          p[offset + 0] = _dmPL.x;
          p[offset + 1] = _dmPL.y;
          p[offset + 2] = _dmPL.z;
          p[offset + 3] = _dmPR.x;
          p[offset + 4] = _dmPR.y;
          p[offset + 5] = _dmPR.z;
          p[offset + 6] = _dmCL.x;
          p[offset + 7] = _dmCL.y;
          p[offset + 8] = _dmCL.z;
          p[offset + 9] = _dmPR.x;
          p[offset + 10] = _dmPR.y;
          p[offset + 11] = _dmPR.z;
          p[offset + 12] = _dmCR.x;
          p[offset + 13] = _dmCR.y;
          p[offset + 14] = _dmCR.z;
          p[offset + 15] = _dmCL.x;
          p[offset + 16] = _dmCL.y;
          p[offset + 17] = _dmCL.z;
          const alpha = THREE.MathUtils.clamp(
            (intensity - DRIFT_MARK_INTENSITY_MIN) *
              DRIFT_MARK_INV_INTENSITY_RANGE,
            0,
            1,
          );
          const colorOffset =
            this.segmentIndex * DRIFT_MARK_COLOR_FLOATS_PER_SEGMENT;
          for (let i = 0; i < DRIFT_MARK_VERTS_PER_SEGMENT; i++) {
            this.colors[colorOffset + i * 4 + 3] = alpha;
          }
          const posAttr = this.geometry.attributes.position;
          posAttr.addUpdateRange(offset, DRIFT_MARK_FLOATS_PER_SEGMENT);
          posAttr.needsUpdate = true;
          const colorAttr = this.geometry.attributes.color;
          colorAttr.addUpdateRange(
            colorOffset,
            DRIFT_MARK_COLOR_FLOATS_PER_SEGMENT,
          );
          colorAttr.needsUpdate = true;
          this.segmentIndex = (this.segmentIndex + 1) % DRIFT_MARK_MAX_SEGMENTS;
          if (
            this.drawCount <
            DRIFT_MARK_MAX_SEGMENTS * DRIFT_MARK_VERTS_PER_SEGMENT
          ) {
            this.drawCount += DRIFT_MARK_VERTS_PER_SEGMENT;
            this.geometry.setDrawRange(0, this.drawCount);
          }
          this.mesh.visible = this.drawCount > 0;
        }
      }

      const AUDIO_URLS = {
        engine: new URL(
          "../v2/static/sounds/vehicle/joao_janz__synth-car-engine-loop.wav",
          import.meta.url,
        ).href,
        wind: new URL(
          "../v2/static/sounds/vehicle/wind-speed.mp3",
          import.meta.url,
        ).href,
        driftBrake: new URL(
          "../v2/static/sounds/vehicle/brak_SOUND.ogg",
          import.meta.url,
        ).href,
        wheels: new URL(
          "../v2/static/sounds/vehicle/wheels-surface.mp3",
          import.meta.url,
        ).href,
      };

      function setupParkourCarAudio(getDriveState) {
        let unlocked = false;
        const loops = [];

        function tryPlay(h) {
          if (unlocked && h.state() === "loaded") h.play();
        }

        function unlock() {
          if (unlocked) return;
          unlocked = true;
          Howler.ctx?.resume?.();
          for (const h of loops) tryPlay(h);
        }

        window.addEventListener("pointerdown", unlock, { once: true });
        window.addEventListener("keydown", unlock, { once: true });

        const engineHowl = new Howl({
          src: [AUDIO_URLS.engine],
          loop: true,
          volume: 0,
          html5: false,
          onload: () => tryPlay(engineHowl),
        });
        const brakeHowl = new Howl({
          src: [AUDIO_URLS.driftBrake],
          loop: true,
          volume: 0,
          onload: () => tryPlay(brakeHowl),
        });
        const windHowl = new Howl({
          src: [AUDIO_URLS.wind],
          loop: true,
          volume: 0,
          onload: () => tryPlay(windHowl),
        });
        const wheelsHowl = new Howl({
          src: [AUDIO_URLS.wheels],
          loop: true,
          volume: 0,
          onload: () => tryPlay(wheelsHowl),
        });
        loops.push(engineHowl, windHowl, brakeHowl, wheelsHowl);

        let engVol = 0;
        let engRate = 1;
        let windVol = 0;
        let windRate = 1;
        let brakeVol = 0;
        let brakeRate = 1;
        let wheelsVol = 0;

        function enginePitchFromSpeed(st, speed, boost) {
          const top = boost ? physParams.maxSpeedBoost : physParams.maxSpeed;
          const idle = Math.max(0, st.enginePitchIdleSpeedMax ?? 0.35);
          const pitchMin = st.enginePitchMin ?? 0.95;
          const pitchMax = st.enginePitchMax ?? 2.65;
          const pitchBoost = Math.max(pitchMax, st.enginePitchBoostMax ?? 3.2);
          const pow = Math.max(0.25, st.enginePitchCurvePow ?? 1);
          if (speed <= idle) return pitchMin;
          if (speed <= top) {
            const t = THREE.MathUtils.clamp(
              (speed - idle) / (top - idle),
              0,
              1,
            );
            return THREE.MathUtils.lerp(pitchMin, pitchMax, Math.pow(t, pow));
          }
          const boostTop =
            top * (physParams.maxSpeedBoost / physParams.maxSpeed);
          const t = THREE.MathUtils.clamp(
            (speed - top) / (boostTop - top),
            0,
            1,
          );
          return THREE.MathUtils.lerp(pitchMax, pitchBoost, Math.pow(t, pow));
        }

        return {
          unlock,
          update(dtSec) {
            const s = getDriveState();
            const st = s.audio || {};
            const enabled = st.enabled !== false && s.active;

            if (!enabled) {
              engVol = windVol = brakeVol = wheelsVol = 0;
            } else {
              const gnd = s.grounded ? 1 : 0.12;
              const engTarget = (st.engineVol ?? 1) * (st.engineMul ?? 1) * gnd;
              const fadeUp = st.engineFadeEaseUp ?? 14;
              engVol += (engTarget - engVol) * (1 - Math.exp(-fadeUp * dtSec));
              const rateTarget = enginePitchFromSpeed(st, s.speed, s.boost);
              const pitchEase = st.enginePitchEase ?? 10;
              engRate +=
                (rateTarget - engRate) * (1 - Math.exp(-pitchEase * dtSec));

              const speedFx = THREE.MathUtils.clamp(s.speed * 0.1, 0, 1);
              const windTarget =
                speedFx * (s.grounded ? 1 : 0.35) * (st.windMul ?? 0);
              windVol += (windTarget - windVol) * (1 - Math.exp(-8 * dtSec));
              windRate = THREE.MathUtils.lerp(1, 1.85, speedFx);

              const hbAmt = s.handbrake
                ? THREE.MathUtils.smoothstep(s.speed, 2, 16)
                : 0;
              const driftAmt = s.drifting
                ? THREE.MathUtils.clamp(
                    (s.driftAngle - DRIFT_ANGLE_MIN) / 0.5,
                    0,
                    1,
                  )
                : 0;
              let brakeDrive = 0;
              if (s.drifting) {
                brakeDrive = 0.78 + hbAmt * 0.24;
              } else if (s.handbrake) {
                brakeDrive = hbAmt * 0.85;
              }
              const brakeTarget = brakeDrive * (st.driftBrakeMul ?? 0.45);
              brakeVol +=
                (brakeTarget - brakeVol) * (1 - Math.exp(-12 * dtSec));
              brakeRate = THREE.MathUtils.lerp(
                0.94,
                1.14,
                THREE.MathUtils.smoothstep(s.speed, 4, 26),
              );

              const wheelsTarget =
                THREE.MathUtils.clamp(s.speed * 0.1, 0, 1) *
                gnd *
                (st.wheelsMul ?? 0.35);
              wheelsVol +=
                (wheelsTarget - wheelsVol) * (1 - Math.exp(-8 * dtSec));
            }

            engineHowl.volume(engVol);
            engineHowl.rate(engRate);
            windHowl.volume(windVol);
            windHowl.rate(windRate);
            brakeHowl.volume(brakeVol);
            brakeHowl.rate(brakeRate);
            wheelsHowl.volume(wheelsVol);
          },
          dispose() {
            engineHowl.unload();
            windHowl.unload();
            brakeHowl.unload();
            wheelsHowl.unload();
          },
        };
      }
      // Self-contained sandbox: physics built inline below, no v2 import.

      const GLB_URL = new URL("./lotusrealsize2.glb", import.meta.url).href;
      const CAR_MODEL_YAW = Math.PI / 2;
      const CAR_MODEL_SCALE = 1;
      const NITRO_KEY = "KeyN";
      const TERRAIN_SIZE = 400;
      const TERRAIN_HALF = TERRAIN_SIZE / 2;
      const WORLD_LIMIT = TERRAIN_HALF - 2;
      // Spawn facing +Z toward slope lab (north of center).
      const SPAWN = { x: 0, y: 0, z: -8, heading: 0 };

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(
        68,
        window.innerWidth / window.innerHeight,
        0.1,
        5000,
      );
      camera.position.set(-10, 5, 18);

      const renderer = new THREE.WebGPURenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 0.3;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFShadowMap;
      document.body.appendChild(renderer.domElement);

      // Atmospheric sky — also drives env reflections via PMREM, so the car's
      // carbon fiber/paint reflects an actual sky instead of RoomEnvironment's
      // hot studio panels (which were producing the white blobs on the roof).
      const skyParams = {
        elevation: 38,
        azimuth: 145,
        turbidity: 4,
        rayleigh: 1.4,
        mieCoefficient: 0.005,
        mieDirectionalG: 0.85,
        envBlur: 0.04,
      };
      const sky = new SkyMesh();
      sky.scale.setScalar(4500);
      if (sky.material) sky.material.fog = false;
      const sunVec = new THREE.Vector3();
      function applySkyParams() {
        sky.turbidity.value = skyParams.turbidity;
        sky.rayleigh.value = skyParams.rayleigh;
        sky.mieCoefficient.value = skyParams.mieCoefficient;
        sky.mieDirectionalG.value = skyParams.mieDirectionalG;
        const phi = THREE.MathUtils.degToRad(90 - skyParams.elevation);
        const theta = THREE.MathUtils.degToRad(skyParams.azimuth);
        sunVec.setFromSphericalCoords(1, phi, theta);
        sky.sunPosition.value.copy(sunVec);
      }
      applySkyParams();
      scene.add(sky);

      const pmrem = new THREE.PMREMGenerator(renderer);
      let envRT = null;
      function rebuildEnvFromSky() {
        const skyEnvScene = new THREE.Scene();
        skyEnvScene.add(sky.clone());
        if (envRT) envRT.dispose();
        envRT = pmrem.fromScene(skyEnvScene, skyParams.envBlur);
        scene.environment = envRT.texture;
      }
      // PMREM is a full multi-pass prefilter — running it on every slider tick
      // (60×/sec while dragging) was stalling the renderer. Sky-mesh uniforms
      // update live; only the env map rebuild is debounced.
      let _envRebuildHandle = 0;
      function rebuildEnvFromSkyDebounced() {
        if (_envRebuildHandle) clearTimeout(_envRebuildHandle);
        _envRebuildHandle = setTimeout(() => {
          _envRebuildHandle = 0;
          rebuildEnvFromSky();
        }, 140);
      }

      // PMREM + env map built after WebGPU init in boot()
      scene.fog = new THREE.Fog(0xb8c8d8, 140, 460);

      const driftMarks = new DriftMarks(scene);
      const _rearContactPts = [new THREE.Vector3(), new THREE.Vector3()];
      const _rearContactGrounded = [false, false];

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 1.5;
      controls.maxDistance = 60;
      controls.enabled = false;
      // Shift+LMB → pan (a la Blender/DCC tools). Right-click still pans too.
      controls.mouseButtons = {
        LEFT: THREE.MOUSE.ROTATE,
        MIDDLE: THREE.MOUSE.DOLLY,
        RIGHT: THREE.MOUSE.PAN,
      };
      window.addEventListener("keydown", (e) => {
        if (e.key === "Shift") controls.mouseButtons.LEFT = THREE.MOUSE.PAN;
      });
      window.addEventListener("keyup", (e) => {
        if (e.key === "Shift") controls.mouseButtons.LEFT = THREE.MOUSE.ROTATE;
      });

      const hemi = new THREE.HemisphereLight(0xc8dcff, 0x4a5468, 0.35);
      scene.add(hemi);
      const sun = new THREE.DirectionalLight(0xfff4e0, 1.5);
      sun.position.copy(sunVec).multiplyScalar(80);
      sun.castShadow = true;
      sun.shadow.mapSize.setScalar(4096);
      sun.shadow.bias = -0.0004;
      sun.shadow.normalBias = 0.025;
      sun.shadow.camera.near = 10;
      sun.shadow.camera.far = 180;
      // Tight frustum around the car — this is a showcase scene, not an open
      // world, so a small frustum gives ~0.015 m/texel which is sharp enough
      // to avoid the blocky self-shadow artifacts on the roof.
      const sh = 38;
      sun.shadow.camera.left = sun.shadow.camera.bottom = -sh;
      sun.shadow.camera.right = sun.shadow.camera.top = sh;
      scene.add(sun);
      scene.add(sun.target);

      const keysHeld = Object.create(null);
      window.addEventListener(
        "keydown",
        (e) => {
          keysHeld[e.code] = true;
          if (e.code === "KeyR") respawn();
          if (e.code === "KeyL" && !e.ctrlKey && !e.metaKey) {
            if (document.activeElement?.closest?.(".lil-gui")) return;
            logCarRigDiagnostics();
          }
          if (e.code === "Tab" || e.code === "KeyO") {
            if (document.activeElement?.closest?.(".lil-gui")) return;
            e.preventDefault();
            orbitInspect = !orbitInspect;
            controls.enabled = orbitInspect;
            if (!orbitInspect) camYaw = carHeading;
          }
          if (carRoot && (/^Arrow/.test(e.code) || e.code === "Space"))
            e.preventDefault();
        },
        { passive: false },
      );
      window.addEventListener("keyup", (e) => {
        keysHeld[e.code] = false;
      });

      // ============================================================
      // === COLLIDERS — tile ground + slope lab + walls
      // ============================================================
      const colliders = [];

      /** Toggle parkour pieces on/off for debugging (visibility + BVH rebake). */
      const parkourDebug = {
        ground: true,
        perimeterWalls: true,
        testWalls: true,
        slopeLab: true,
        bridgeStraight: true,
        bridgeCurved: true,
        jumpRamp: true,
      };

      const parkourGroupMeta = {
        ground: "Ground tile",
        perimeterWalls: "Perimeter walls",
        testWalls: "Test walls (near spawn)",
        slopeLab: "Slope lab (5°–55°)",
        bridgeStraight: "Bridge straight (west)",
        bridgeCurved: "Bridge curved (east)",
        jumpRamp: "Jump ramp (south)",
      };

      const parkourGroupObjects = Object.fromEntries(
        Object.keys(parkourDebug).map((id) => [id, []]),
      );
      /** @type {import('lil-gui').Controller[]} */
      const parkourGuiControllers = [];

      function registerParkourObject(groupId, obj) {
        if (!obj || !parkourGroupObjects[groupId]) return obj;
        parkourGroupObjects[groupId].push(obj);
        obj.userData.parkourGroup = groupId;
        return obj;
      }

      function isParkourGroupEnabled(groupId) {
        return parkourDebug[groupId] !== false;
      }

      function applyParkourGroupVisibility(groupId) {
        const enabled = isParkourGroupEnabled(groupId);
        for (const obj of parkourGroupObjects[groupId] || []) {
          obj.visible = enabled;
        }
      }

      function applyAllParkourGroups() {
        for (const groupId of Object.keys(parkourGroupObjects)) {
          applyParkourGroupVisibility(groupId);
        }
      }

      function setParkourGroupEnabled(groupId, enabled) {
        if (!(groupId in parkourDebug)) return;
        parkourDebug[groupId] = enabled;
        applyParkourGroupVisibility(groupId);
        rebakePlayerBvh();
      }

      function setAllParkourGroupsEnabled(enabled) {
        for (const groupId of Object.keys(parkourDebug)) {
          parkourDebug[groupId] = enabled;
        }
        applyAllParkourGroups();
        for (const ctrl of parkourGuiControllers) ctrl.updateDisplay();
        rebakePlayerBvh();
      }

      /** Same defaults as v2 `sharedTileMaterial.js` — objectSpace per mesh. */
      const TILE_SHARED = {
        roughness: 0.95,
        textureScale: 400,
        tileColor: 0x9a9a9a,
        gridColor: 0x444444,
        gridLineColor: 0x111111,
        objectSpace: true,
      };
      function createTileMat(seed = 0) {
        const s = seed * 19.17;
        return createTileMaterial({
          ...TILE_SHARED,
          uvOffset: [s * 1.31, 0, s * 0.97],
        });
      }

      function addCollider(
        mesh,
        { collidable = true, doubleSided = false, group = null } = {},
      ) {
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        if (doubleSided) mesh.userData.bvhDoubleSided = true;
        if (group) registerParkourObject(group, mesh);
        scene.add(mesh);
        if (collidable) colliders.push(mesh);
        return mesh;
      }

      function addParkourVisual(group, mesh) {
        mesh.castShadow = mesh.castShadow ?? true;
        mesh.receiveShadow = mesh.receiveShadow ?? true;
        registerParkourObject(group, mesh);
        scene.add(mesh);
        return mesh;
      }

      /** Lift ramp footprints slightly so they don't z-fight the ground plane. */
      const RAMP_GROUND_LIFT = 0.025;

      /** Double-sided vertical end cap — replaces one-sided PlaneGeometry back walls. */
      function addVisualEndCap(parent, mat, halfW, z, topY) {
        if (topY < 0.02) return;
        const g = new THREE.BufferGeometry();
        g.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(
            new Float32Array([
              -halfW,
              RAMP_GROUND_LIFT,
              z,
              halfW,
              RAMP_GROUND_LIFT,
              z,
              halfW,
              topY,
              z,
              -halfW,
              topY,
              z,
            ]),
            3,
          ),
        );
        // Both windings so the cap reads from either side.
        g.setIndex([0, 1, 2, 0, 2, 3, 0, 2, 1, 0, 3, 2]);
        g.computeVertexNormals();
        const m = new THREE.Mesh(g, mat);
        m.userData.bvhIgnore = true;
        m.castShadow = true;
        m.receiveShadow = true;
        parent.add(m);
      }

      /** Readable angle label painted on the ground (non-collidable). */
      function createFloorLabel(text, x, z, width = 4.2, group = null) {
        const cw = 320;
        const ch = 128;
        const canvas = document.createElement("canvas");
        canvas.width = cw;
        canvas.height = ch;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "rgba(8, 10, 14, 0.88)";
        ctx.fillRect(0, 0, cw, ch);
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 5;
        ctx.strokeRect(6, 6, cw - 12, ch - 12);
        ctx.fillStyle = "#ffffff";
        ctx.font = `bold ${width > 5 ? 52 : 64}px system-ui, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, cw / 2, ch / 2);
        const tex = new THREE.CanvasTexture(canvas);
        tex.colorSpace = THREE.SRGBColorSpace;
        const mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(width, width * 0.393),
          new THREE.MeshBasicMaterial({
            map: tex,
            transparent: true,
            depthWrite: false,
          }),
        );
        mesh.rotation.x = -Math.PI / 2;
        mesh.position.set(x, 0.04, z);
        if (group) registerParkourObject(group, mesh);
        scene.add(mesh);
        return mesh;
      }

      function buildWedge(width, length, height, mat) {
        const w2 = width / 2;
        const y0 = RAMP_GROUND_LIFT;
        // Collidable geometry: ground footprint + sloped driving surface only.
        // Vertical sides are visual children (excluded from BVH bake).
        const positions = new Float32Array([
          -w2,
          y0,
          0,
          w2,
          y0,
          0,
          -w2,
          y0,
          length,
          w2,
          y0,
          length,
          -w2,
          height,
          length,
          w2,
          height,
          length,
        ]);
        const indices = [0, 1, 2, 1, 3, 2, 0, 4, 1, 1, 4, 5];
        const g = new THREE.BufferGeometry();
        g.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        g.setIndex(indices);
        g.computeVertexNormals();
        const ramp = new THREE.Mesh(g, mat);

        function addVisualSide(a, b, c) {
          const sg = new THREE.BufferGeometry();
          sg.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(
              new Float32Array([
                positions[a * 3],
                positions[a * 3 + 1],
                positions[a * 3 + 2],
                positions[b * 3],
                positions[b * 3 + 1],
                positions[b * 3 + 2],
                positions[c * 3],
                positions[c * 3 + 1],
                positions[c * 3 + 2],
              ]),
              3,
            ),
          );
          sg.setIndex([0, 1, 2]);
          sg.computeVertexNormals();
          const m = new THREE.Mesh(sg, mat);
          m.userData.bvhIgnore = true;
          m.castShadow = true;
          m.receiveShadow = true;
          ramp.add(m);
        }
        addVisualSide(0, 2, 4);
        addVisualSide(1, 5, 3);
        addVisualEndCap(ramp, mat, w2, length, height);
        return ramp;
      }

      /**
       * Curved launch ramp built from a Catmull-Rom spline — smooth ease-up
       * starting flat and tangent-rising to ~30° at the tip. Only the top
       * driving surface enters the BVH; visual side panels and tip wall are
       * non-collidable children, mirroring the wedge back-wall trick.
       */
      function buildSplineRamp(
        centerX,
        centerZ,
        length,
        height,
        width,
        segments,
        yaw,
        mat,
        descend = false,
      ) {
        const halfW = width / 2;
        const curve = descend
          ? new THREE.CatmullRomCurve3([
              new THREE.Vector3(0, height, 0),
              new THREE.Vector3(0, height * 0.96, length * 0.28),
              new THREE.Vector3(0, height * 0.5, length * 0.72),
              new THREE.Vector3(0, 0, length),
            ])
          : new THREE.CatmullRomCurve3([
              new THREE.Vector3(0, 0, 0),
              new THREE.Vector3(0, height * 0.04, length * 0.28),
              new THREE.Vector3(0, height * 0.5, length * 0.72),
              new THREE.Vector3(0, height, length),
            ]);
        const points = [];
        for (let i = 0; i <= segments; i++) {
          points.push(curve.getPoint(i / segments));
        }

        const topPos = [];
        for (const p of points) {
          topPos.push(p.x - halfW, p.y, p.z);
          topPos.push(p.x + halfW, p.y, p.z);
        }
        const topIdx = [];
        for (let i = 0; i < segments; i++) {
          const a = i * 2,
            b = a + 1,
            c = a + 2,
            d = a + 3;
          topIdx.push(a, c, b, b, c, d);
        }
        const topGeo = new THREE.BufferGeometry();
        topGeo.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(topPos, 3),
        );
        topGeo.setIndex(topIdx);
        topGeo.computeVertexNormals();
        const ramp = new THREE.Mesh(topGeo, mat);

        function makeSidePanel(sign) {
          const pos = [];
          for (const p of points) {
            pos.push(p.x + sign * halfW, p.y, p.z);
            pos.push(p.x + sign * halfW, RAMP_GROUND_LIFT, p.z);
          }
          const idx = [];
          for (let i = 0; i < segments; i++) {
            const a = i * 2,
              b = a + 1,
              c = a + 2,
              d = a + 3;
            if (sign < 0) idx.push(a, b, c, c, b, d);
            else idx.push(a, c, b, b, c, d);
          }
          const g = new THREE.BufferGeometry();
          g.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
          g.setIndex(idx);
          g.computeVertexNormals();
          const m = new THREE.Mesh(g, mat);
          m.userData.bvhIgnore = true;
          m.castShadow = true;
          m.receiveShadow = true;
          return m;
        }
        ramp.add(makeSidePanel(-1));
        ramp.add(makeSidePanel(1));

        const tip = points[points.length - 1];
        const highZ = descend ? 0 : tip.z;
        const highY = descend ? height : tip.y;
        addVisualEndCap(ramp, mat, halfW, highZ, highY);

        ramp.rotation.y = yaw;
        ramp.position.set(centerX, 0, centerZ);
        return ramp;
      }

      /** Wedge ramp descending from deck height at z=0 to ground at z=length. */
      function buildWedgeDescent(width, length, height, mat) {
        const w2 = width / 2;
        const y0 = RAMP_GROUND_LIFT;
        const positions = new Float32Array([
          -w2,
          y0,
          length,
          w2,
          y0,
          length,
          -w2,
          y0,
          0,
          w2,
          y0,
          0,
          -w2,
          height,
          0,
          w2,
          height,
          0,
        ]);
        const indices = [0, 1, 2, 1, 3, 2, 0, 4, 1, 1, 4, 5];
        const g = new THREE.BufferGeometry();
        g.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        g.setIndex(indices);
        g.computeVertexNormals();
        const ramp = new THREE.Mesh(g, mat);

        function addVisualSide(a, b, c) {
          const sg = new THREE.BufferGeometry();
          sg.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(
              new Float32Array([
                positions[a * 3],
                positions[a * 3 + 1],
                positions[a * 3 + 2],
                positions[b * 3],
                positions[b * 3 + 1],
                positions[b * 3 + 2],
                positions[c * 3],
                positions[c * 3 + 1],
                positions[c * 3 + 2],
              ]),
              3,
            ),
          );
          sg.setIndex([0, 1, 2]);
          sg.computeVertexNormals();
          const m = new THREE.Mesh(sg, mat);
          m.userData.bvhIgnore = true;
          m.castShadow = true;
          m.receiveShadow = true;
          ramp.add(m);
        }
        addVisualSide(0, 2, 4);
        addVisualSide(1, 5, 3);
        addVisualEndCap(ramp, mat, w2, 0, height);
        return ramp;
      }

      function placeBridgePart(
        mesh,
        centerX,
        centerZ,
        localX,
        localZ,
        yaw,
        y = 0,
        group = null,
      ) {
        const c = Math.cos(yaw);
        const s = Math.sin(yaw);
        mesh.position.set(
          centerX + localX * c - localZ * s,
          y,
          centerZ + localX * s + localZ * c,
        );
        mesh.rotation.y = yaw;
        addCollider(mesh, { group });
      }

      /** Collidable deck top only — box underside must not snag ground rays. */
      function placeBridgeDeck(
        centerX,
        centerZ,
        deckLen,
        deckW,
        deckHeight,
        yaw,
        mat,
        group,
      ) {
        const deckTop = new THREE.Mesh(
          new THREE.PlaneGeometry(deckW, deckLen),
          mat,
        );
        deckTop.rotation.x = -Math.PI / 2;
        placeBridgePart(
          deckTop,
          centerX,
          centerZ,
          0,
          0,
          yaw,
          deckHeight,
          group,
        );

        const deckVisual = new THREE.Mesh(
          new THREE.BoxGeometry(deckW, 0.4, deckLen),
          mat,
        );
        deckVisual.position.set(centerX, deckHeight - 0.2, centerZ);
        deckVisual.rotation.y = yaw;
        deckVisual.userData.bvhIgnore = true;
        addParkourVisual(group, deckVisual);
      }

      /** Flat deck with linear wedge ramps on both ends. */
      function buildStraightBridge(
        centerX,
        centerZ,
        deckLen,
        deckW,
        rampLen,
        deckHeight,
        yaw,
        mat,
        group,
      ) {
        const rampUp = buildWedge(deckW, rampLen, deckHeight, mat);
        placeBridgePart(
          rampUp,
          centerX,
          centerZ,
          0,
          -(deckLen / 2 + rampLen / 2),
          yaw,
          0,
          group,
        );

        placeBridgeDeck(
          centerX,
          centerZ,
          deckLen,
          deckW,
          deckHeight,
          yaw,
          mat,
          group,
        );

        const rampDown = buildWedgeDescent(deckW, rampLen, deckHeight, mat);
        placeBridgePart(
          rampDown,
          centerX,
          centerZ,
          0,
          deckLen / 2 + rampLen / 2,
          yaw,
          0,
          group,
        );
      }

      /** Flat deck with spline ramps on both ends. */
      function buildCurvedBridge(
        centerX,
        centerZ,
        deckLen,
        deckW,
        rampLen,
        deckHeight,
        yaw,
        mat,
        group,
      ) {
        const rampUp = buildSplineRamp(
          0,
          0,
          rampLen,
          deckHeight,
          deckW,
          48,
          0,
          mat,
          false,
        );
        placeBridgePart(
          rampUp,
          centerX,
          centerZ,
          0,
          -(deckLen / 2 + rampLen / 2),
          yaw,
          0,
          group,
        );

        placeBridgeDeck(
          centerX,
          centerZ,
          deckLen,
          deckW,
          deckHeight,
          yaw,
          mat,
          group,
        );

        const rampDown = buildSplineRamp(
          0,
          0,
          rampLen,
          deckHeight,
          deckW,
          48,
          0,
          mat,
          true,
        );
        placeBridgePart(
          rampDown,
          centerX,
          centerZ,
          0,
          deckLen / 2 + rampLen / 2,
          yaw,
          0,
          group,
        );
      }

      /** Visible boundary walls — inner face sits just inside the tile edge. */
      function buildPerimeterWalls(halfExtent, height, thickness, group) {
        const y = height / 2;
        const span = halfExtent * 2;
        const walls = [
          {
            sx: span + thickness,
            sy: height,
            sz: thickness,
            px: 0,
            pz: halfExtent + thickness / 2,
          },
          {
            sx: span + thickness,
            sy: height,
            sz: thickness,
            px: 0,
            pz: -(halfExtent + thickness / 2),
          },
          {
            sx: thickness,
            sy: height,
            sz: span,
            px: halfExtent + thickness / 2,
            pz: 0,
          },
          {
            sx: thickness,
            sy: height,
            sz: span,
            px: -(halfExtent + thickness / 2),
            pz: 0,
          },
        ];
        walls.forEach((w, i) => {
          const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w.sx, w.sy, w.sz),
            createTileMat(880 + i),
          );
          mesh.position.set(w.px, y, w.pz);
          addCollider(mesh, { group });
        });
      }

      function buildCircuit() {
        const ground = new THREE.Mesh(
          new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE),
          createTileMat(0),
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        ground.userData.bvhDoubleSided = true;
        addCollider(ground, { group: "ground" });

        buildPerimeterWalls(TERRAIN_HALF - 3, 14, 1.1, "perimeterWalls");

        createFloorLabel("SPAWN", 0, -14, 4.2, "ground");

        const wallMat = createTileMat(42);
        const wall = new THREE.Mesh(
          new THREE.BoxGeometry(18, 2.6, 0.55),
          wallMat,
        );
        wall.position.set(14, 1.3, 4);
        addCollider(wall, { group: "testWalls" });

        const wall2 = new THREE.Mesh(
          new THREE.BoxGeometry(0.55, 2.6, 14),
          createTileMat(43),
        );
        wall2.position.set(4, 1.3, -14);
        addCollider(wall2, { group: "testWalls" });

        createFloorLabel("WALL", 14, 8, 4.2, "testWalls");
        createFloorLabel("WALL", 4, -10, 4.2, "testWalls");

        buildSlopeTestGrid();
        buildBridgeTests();

        // Spline jump ramp — south of spawn; drive south into a 4 m launch.
        const kickerMat = createTileMat(77);
        const kicker = buildSplineRamp(0, -38, 16, 4.5, 11, 64, 0, kickerMat);
        addCollider(kicker, { group: "jumpRamp" });
        createFloorLabel("JUMP", -7, -52, 4.2, "jumpRamp");

        applyAllParkourGroups();
      }

      /** East/west bridge pair — straight linear ramps vs curved spline ramps. */
      function buildBridgeTests() {
        const deckLen = 16;
        const deckW = 10;
        const rampLen = 14;
        const deckHeight = 3.8;

        buildStraightBridge(
          -62,
          6,
          deckLen,
          deckW,
          rampLen,
          deckHeight,
          Math.PI / 2,
          createTileMat(501),
          "bridgeStraight",
        );
        createFloorLabel("BRIDGE STRAIGHT", -62, -16, 6.5, "bridgeStraight");

        buildCurvedBridge(
          62,
          6,
          deckLen,
          deckW,
          rampLen,
          deckHeight,
          -Math.PI / 2,
          createTileMat(502),
          "bridgeCurved",
        );
        createFloorLabel("BRIDGE CURVED", 62, -16, 6.5, "bridgeCurved");
      }

      /** North of center: 11 wedges 5°–55° in a row centered on X. */
      function buildSlopeTestGrid() {
        const baseZ = 52;
        const rampLen = 20;
        const rampW = 8;
        const gap = rampW + 2.8;
        const angles = [5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
        const startX = -((angles.length - 1) * gap) / 2;

        angles.forEach((deg, i) => {
          const rise = rampLen * Math.tan(THREE.MathUtils.degToRad(deg));
          const x = startX + i * gap;
          const mat = createTileMat(i + 1);

          const approach = new THREE.Mesh(
            new THREE.PlaneGeometry(rampW, 8),
            createTileMat(i + 100),
          );
          approach.rotation.x = -Math.PI / 2;
          approach.position.set(x, 0.012, baseZ - rampLen / 2 - 7);
          addCollider(approach, { group: "slopeLab" });

          const ramp = buildWedge(rampW, rampLen, rise, mat);
          ramp.position.set(x, 0, baseZ - rampLen / 2);
          ramp.userData.slopeDeg = deg;
          addCollider(ramp, { group: "slopeLab" });

          const topZ = baseZ + rampLen / 2;

          if (deg >= 45) {
            const barrier = new THREE.Mesh(
              new THREE.BoxGeometry(rampW + 0.7, 4, 0.8),
              createTileMat(i + 300),
            );
            barrier.position.set(x, rise + 2, topZ + 8.4);
            addCollider(barrier, { group: "slopeLab" });
          }

          createFloorLabel(
            `${deg}°`,
            x,
            baseZ - rampLen / 2 - 13,
            4.2,
            "slopeLab",
          );
        });
      }

      // ============================================================
      // === CIRCUIT BVH — v2's CliffBvh (exactly the editor's playMode bake)
      // ============================================================
      /**
       * Scene store for `cliffBvh.bake` — same rule as v2 playMode: only
       * driving surfaces collide. Visual children (side panels, back walls,
       * bridge box undersides) are tagged `userData.bvhIgnore`.
       */
      const sceneStore = {
        forEachMeshInstance(cb) {
          for (const root of colliders) {
            const groupId = root.userData.parkourGroup;
            if (groupId && !isParkourGroupEnabled(groupId)) continue;
            root.updateMatrixWorld(true);
            root.traverse((node) => {
              if (!node.isMesh || node.userData.bvhIgnore) return;
              cb(node.geometry, node.matrixWorld);
            });
          }
        },
      };

      /** Flat-floor terrain — lotus circuit has no heightmap, ground sits at y=0. */
      const terrainStore = {
        getWorldHeight(_x, _z) {
          return 0;
        },
      };

      const circuitConfig = { world: { size: TERRAIN_SIZE } };

      const cliffBvh = new CliffBvh(sceneStore);
      function rebakePlayerBvh() {
        cliffBvh.bake(terrainStore, circuitConfig);
      }

      /** Parkour fork of v2 CarPhysics — v2 file stays untouched. */
      const carPhysics = new ParkourCarPhysics();

      /** Debug draw for CarPhysics.lotusHull (spheres + depenetration probes). */
      const hullDebug = {
        enabled: false,
        showSpheres: true,
        showProbes: true,
        showContacts: true,
      };
      let hullDebugRoot = null;
      /** @type {THREE.Mesh[]} */
      let hullDebugSphereMeshes = [];
      /** @type {THREE.LineSegments[]} */
      let hullDebugProbeBoxes = [];
      /** @type {THREE.Mesh[]} */
      let hullDebugContactDots = [];
      let hullDebugSphereGeo = null;

      function disposeHullDebugSphereMeshes() {
        for (const mesh of hullDebugSphereMeshes) {
          hullDebugRoot?.remove(mesh);
          mesh.material?.dispose();
        }
        hullDebugSphereMeshes = [];
      }

      function rebuildHullDebugSphereMeshes() {
        if (!hullDebugRoot || !carPhysics) return;
        disposeHullDebugSphereMeshes();
        if (!hullDebugSphereGeo) {
          hullDebugSphereGeo = new THREE.IcosahedronGeometry(1, 1);
        }
        const lh = carPhysics.lotusHull;
        for (let i = 0; i < lh.hullSpheres.length; i++) {
          const hs = lh.hullSpheres[i];
          const mat = new THREE.MeshBasicMaterial({
            color: new THREE.Color().setHSL(0.38 + i * 0.04, 0.9, 0.55),
            wireframe: true,
            depthTest: true,
          });
          const mesh = new THREE.Mesh(hullDebugSphereGeo, mat);
          mesh.name = `hullSphere:${hs.label || i}`;
          hullDebugRoot.add(mesh);
          hullDebugSphereMeshes.push(mesh);
        }
      }

      function ensureHullDebugVisuals() {
        if (hullDebugRoot) {
          rebuildHullDebugSphereMeshes();
          return;
        }
        hullDebugRoot = new THREE.Group();
        hullDebugRoot.name = "lotusHullDebug";
        scene.add(hullDebugRoot);

        rebuildHullDebugSphereMeshes();

        for (let i = 0; i < 2; i++) {
          const mat = new THREE.LineBasicMaterial({
            color: i === 0 ? 0xff8844 : 0xffaa66,
            transparent: true,
            opacity: 0.95,
          });
          const box = new THREE.LineSegments(new THREE.BufferGeometry(), mat);
          box.name = i === 0 ? "probeBoxLow" : "probeBoxHigh";
          hullDebugProbeBoxes.push(box);
          hullDebugRoot.add(box);
        }

        const dotGeo = new THREE.SphereGeometry(0.07, 8, 6);
        const dotMat = new THREE.MeshBasicMaterial({ color: 0xffff44 });
        for (let i = 0; i < 4; i++) {
          const dot = new THREE.Mesh(dotGeo, dotMat);
          dot.name = `wheelContact:${i}`;
          hullDebugContactDots.push(dot);
          hullDebugRoot.add(dot);
        }
      }

      const _hullDbgCorner = [
        new THREE.Vector3(),
        new THREE.Vector3(),
        new THREE.Vector3(),
        new THREE.Vector3(),
      ];

      function updateHullDebugProbeBox(
        lines,
        px,
        py,
        pz,
        halfL,
        halfW,
        fwdX,
        fwdZ,
        rightX,
        rightZ,
      ) {
        const corner = (fSign, rSign, idx) => {
          _hullDbgCorner[idx].set(
            px + fwdX * halfL * fSign + rightX * halfW * rSign,
            py,
            pz + fwdZ * halfL * fSign + rightZ * halfW * rSign,
          );
        };
        corner(1, 1, 0);
        corner(1, -1, 1);
        corner(-1, -1, 2);
        corner(-1, 1, 3);
        const pts = [];
        const ring = [
          [0, 1],
          [1, 2],
          [2, 3],
          [3, 0],
        ];
        for (const [a, b] of ring) {
          const va = _hullDbgCorner[a];
          const vb = _hullDbgCorner[b];
          pts.push(va.x, va.y, va.z, vb.x, vb.y, vb.z);
        }
        lines.geometry.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(pts, 3),
        );
        lines.geometry.computeBoundingSphere();
      }

      function updateHullDebugVisuals() {
        if (!hullDebug.enabled || !carRoot || !carWheels.length) {
          if (hullDebugRoot) hullDebugRoot.visible = false;
          return;
        }
        ensureHullDebugVisuals();
        hullDebugRoot.visible = true;

        const lh = carPhysics.lotusHull;
        const sf = CAR_MODEL_SCALE;
        const px = state.pos.x;
        const pz = state.pos.z;
        const carY = state.pos.y;
        const heading = state.yaw;
        const fwdX = -Math.sin(heading);
        const fwdZ = -Math.cos(heading);
        const rightX = Math.cos(heading);
        const rightZ = -Math.sin(heading);
        const ride = lh.rideHeight * sf;
        const halfL = lh.probeHalfLength * sf;
        const halfW = lh.probeHalfWidth * sf;

        if (hullDebug.showSpheres) {
          for (let i = 0; i < hullDebugSphereMeshes.length; i++) {
            const mesh = hullDebugSphereMeshes[i];
            const h = lh.hullSpheres[i];
            if (!h) {
              mesh.visible = false;
              continue;
            }
            mesh.visible = true;
            const r = Math.max(0.05, h.r * sf);
            mesh.position.set(
              px + (fwdX * h.fwd + rightX * h.right) * sf,
              carY + h.y * sf,
              pz + (fwdZ * h.fwd + rightZ * h.right) * sf,
            );
            mesh.scale.setScalar(r);
          }
        } else {
          for (const mesh of hullDebugSphereMeshes) mesh.visible = false;
        }

        if (hullDebug.showProbes && hullDebugProbeBoxes.length >= 2) {
          const yLow = carY + ride + lh.probeYLow * sf;
          const yHigh = carY + ride + lh.probeYHigh * sf;
          hullDebugProbeBoxes[0].visible = true;
          hullDebugProbeBoxes[1].visible = true;
          updateHullDebugProbeBox(
            hullDebugProbeBoxes[0],
            px,
            yLow,
            pz,
            halfL,
            halfW,
            fwdX,
            fwdZ,
            rightX,
            rightZ,
          );
          updateHullDebugProbeBox(
            hullDebugProbeBoxes[1],
            px,
            yHigh,
            pz,
            halfL,
            halfW,
            fwdX,
            fwdZ,
            rightX,
            rightZ,
          );
        } else {
          for (const box of hullDebugProbeBoxes) box.visible = false;
        }

        if (hullDebug.showContacts) {
          const pitch = state.terrainPitch + state.dynPitch;
          const roll = state.terrainRoll + state.dynRoll;
          for (let i = 0; i < 4 && i < carWheels.length; i++) {
            const dot = hullDebugContactDots[i];
            const w = carWheels[i];
            const hub = wheelHubWorldXZ(
              px,
              pz,
              w.offset.x,
              w.offset.z,
              hubLocalY,
              pitch,
              roll,
            );
            dot.visible = true;
            dot.position.set(hub.x, state.wheelContactY[i], hub.z);
          }
        } else {
          for (const dot of hullDebugContactDots) dot.visible = false;
        }
      }
      /** Push GUI-tunable dims into v2's chassis so hull matches the placed car. */
      function syncCarPhysicsFromParams() {
        const lh = carPhysics.lotusHull;
        const lc = carPhysics.lotusChassis;
        lc.rideHeight = physParams.rideHeight;
        lc.wheelBase = physParams.wheelBase;
        lc.track = physParams.track;
        lh.rideHeight = physParams.rideHeight;
        carPhysics.wallRestitution = physParams.wallRestitution;
      }

      // ============================================================
      // === CAR PHYSICS — arcade Lotus drive layer (v2 hull + suspension below)
      // ============================================================
      /** Arcade Lotus — matches `v2/play/lotusPhysics.js` (heading steer + handbrake slip). */
      const physParams = {
        accel: 34,
        accelBoost: 62,
        brake: 30,
        reverseAccel: 10,
        maxSpeed: 58,
        maxSpeedBoost: 88,
        coast: 1.0,
        drag: 0.0035,
        handbrakeDecel: 4,
        baseAccelLowSpeedMul: 0.55,
        baseAccelRampToKmh: 120,

        turnRate: 1.2,
        turnRateDrift: 2.35,
        turnRateCounter: 1.65,
        steerVisualMax: 0.36,

        gripBase: 11.5,
        gripSpeedDecay: 0.1,
        gripMinSpeed: 3.5,
        gripHandbrake: 0.55,
        gripCounterBonus: 3,
        gripBrakeTurn: 1.8,
        gripRecoveryRate: 8,
        gripHandbrakeApplyRate: 7,
        /** Per-wheel load coupling: 0 = body-level grip (old), 1 = grip scaled by
         *  totalSpringForce/weight from suspension telemetry. Airborne → 0. */
        gripLoadCoupling: 1.0,
        /** Cap on load factor — allows brief grip bonus on hard landings. */
        gripLoadMax: 1.3,

        driftEntrySpeed: 10,
        driftAngleMin: 0.1,
        driftAngleExit: 0.05,
        driftRequiresHandbrake: true,

        // Horizontal air drag — gravity / suspension / wheel rays now live
        // inside CarPhysics (gravity, ride, wheelBvhRayPad… are in
        // carPhysics.lotusChassis; hull / probes / step-over in lotusHull).
        airDrag: 0.15,

        // Smoothing / visual
        pitchSmooth: 10,
        rollSmooth: 10,
        /** Squat/dive smoothing — slower than terrain so accel tilt isn't bouncy. */
        dynPitchSmooth: 5,
        dynRollSmooth: 5,
        dynRollMax: 0.12,
        /** Max cosmetic squat/dive (rad) — matches v2 lotusPhysics.bodyPitchMax scale. */
        dynPitchMax: 0.12,
        cornerLeanMax: 0.035,
        /** Cap visible chassis tilt — keeps the cosmetic dyn pitch/roll from
         *  flipping the car on steep slopes; CarPhysics doesn't clamp pitch. */
        chassisTiltMax: 0.55,

        wheelBase: 1.9,
        track: 1.1,
        rideHeight: 0.35,
        wheelRadius: 0.38,
        /** Visual-only chassis lift above wheels (model-local units). Physics
         *  rideHeight is hub-relative, so it has no visible effect on its own;
         *  this offsets carChassisVisual.y so the body sits higher above wheels. */
        chassisVisualLift: 0.18,
        /** Velocity-Y deadband: when grounded and |velY| below this, snap to 0
         *  to kill suspension ring at rest (underdamped relax + variable dt). */
        velYRestSnap: 0.08,
        /** Wall-hit restitution: 0 = stick (old), 1 = perfect bounce. */
        wallRestitution: 0.4,
      };

      /** Lotus GLB + playMode: wheel XZ uses hy = yaw − CAR_MODEL_YAW + π (not raw yaw). */
      const _lotusHy = { c: 1, s: 0 };
      function updateLotusHy(yaw) {
        const hy = yaw - CAR_MODEL_YAW + Math.PI;
        _lotusHy.c = Math.cos(hy);
        _lotusHy.s = Math.sin(hy);
      }
      function wheelHubWorldXZ(
        px,
        pz,
        lx,
        lz,
        localHubY = 0,
        pitch = 0,
        roll = 0,
      ) {
        _hubLocal.set(lx, localHubY, lz);
        _eulerChassis.set(-roll, 0, pitch);
        _quatChassis.setFromEuler(_eulerChassis);
        _hubLocal.applyQuaternion(_quatChassis);
        return {
          x: px + _hubLocal.x * _lotusHy.c + _hubLocal.z * _lotusHy.s,
          z: pz - _hubLocal.x * _lotusHy.s + _hubLocal.z * _lotusHy.c,
        };
      }
      /** Hub world Y with current chassis pitch/roll (wheel rays + visuals). */
      function wheelHubWorldY(bodyY, lx, lz, localHubY, pitch, roll) {
        _hubLocal.set(lx, localHubY, lz);
        _eulerChassis.set(-roll, 0, pitch);
        _quatChassis.setFromEuler(_eulerChassis);
        _hubLocal.applyQuaternion(_quatChassis);
        return bodyY + groundOffset + _hubLocal.y;
      }
      function lotusDriveBasis(yaw, outFwd, outRight) {
        updateLotusHy(yaw);
        outFwd.set(_lotusHy.c, 0, -_lotusHy.s);
        outRight.set(_lotusHy.s, 0, _lotusHy.c);
      }

      /** Chassis-local hub offsets — must match placed GLB wheels (includes cCenter). */
      function wheelLayoutLocal() {
        if (carWheels.length === 4) {
          return carWheels.map((w) => ({
            x: w.offset.x,
            z: w.offset.z,
            steer: w.steer,
            name: w.name,
          }));
        }
        const halfWB = physParams.wheelBase * 0.5;
        const halfT = physParams.track * 0.5;
        return [
          { x: halfWB, z: -halfT, steer: true, name: "FL" },
          { x: halfWB, z: halfT, steer: true, name: "FR" },
          { x: -halfWB, z: -halfT, steer: false, name: "RL" },
          { x: -halfWB, z: halfT, steer: false, name: "RR" },
        ];
      }

      const state = {
        pos: new THREE.Vector3(), // pos.y = ground-contact altitude under car
        vel: new THREE.Vector3(), // world velocity (includes Y for jumps)
        yaw: 0,
        yawRate: 0,
        terrainPitch: 0,
        terrainRoll: 0,
        dynPitch: 0,
        dynRoll: 0,
        steerVisual: 0,
        boostBlend: 0,
        wheelSpin: 0,
        grounded: true,
        airTimer: 0,
        wheelContactY: [0, 0, 0, 0],
        wheelHit: [false, false, false, false],
        driftAngle: 0,
        carDrifting: false,
      };

      /** Mirrors v2 `toolState.playCarAudio` — all layers used by `setupParkourCarAudio`. */
      const carAudioSettings = {
        enabled: false,
        engineMul: 1,
        engineVol: 1,
        enginePitchMin: 0.95,
        enginePitchMax: 2.65,
        enginePitchBoostMax: 3.2,
        enginePitchIdleSpeedMax: 0.35,
        enginePitchCurvePow: 1.05,
        enginePitchEase: 10,
        engineFadeEaseUp: 14,
        windMul: 0.25,
        driftBrakeMul: 0.55,
        wheelsMul: 0.35,
      };

      let carAudio = null;
      carAudio = setupParkourCarAudio(() => ({
        active: !!carRoot && carWheels.length > 0 && !orbitInspect,
        speed: Math.hypot(state.vel.x, state.vel.z),
        grounded: state.grounded,
        handbrake: !!keysHeld.Space,
        drifting: state.carDrifting,
        driftAngle: state.driftAngle,
        boost: !!(keysHeld.ShiftLeft || keysHeld.ShiftRight),
        audio: carAudioSettings,
      }));

      // Aliases — existing camera / GUI code references these
      const playerPos = state.pos;
      let carHeading = 0;
      let camYaw = 0;
      let orbitInspect = false;

      let carWheels = [];
      let carRoot = null;
      let carChassis = null;
      /** Cosmetic squat/dive — same axes as carChassis, wheels stay outside this. */
      let carBodyPivot = null;
      /** GLB body mesh group — sibling of wheel containers under carChassis. */
      let carChassisVisual = null;
      let chassisMetrics = null;
      let hubLocalY = 0;
      // wheelContainer source origin is not at the wheel hub — measure the
      // wheelCylinder's offset in container-local space once at load time so
      // we can counter-offset each placed container (otherwise mirroring the
      // right-side containers 180° flips this offset and the wheels go
      // asymmetric front-to-back).
      const wheelContainerHubOffset = new THREE.Vector3();

      const cam = {
        distance: 5,
        height: 0.2,
        lookAtY: 2,
        chaseSpeed: 7,
        driftLag: 1.6,
        fov: 72,
      };

      const hudEl = document.getElementById("hud");

      function applyShadows(root) {
        root.traverse((o) => {
          if (o.isMesh || o.isSkinnedMesh) {
            o.castShadow = true;
            o.receiveShadow = true;
          }
        });
      }

      /** Same bbox ratios as v2/play/playMode.js `_loadLotus` (real-size: no footprint normalize). */
      const lotusWheelLayout = {
        trackWidth: 0.4,
        wheelbase: 0.287,
        wheelY: 0.23,
        wbShift: -0.024,
      };

      let groundOffset = 0;

      const _v3a = new THREE.Vector3();
      const _v3b = new THREE.Vector3();
      const _boxA = new THREE.Box3();

      /** Mirror playMode `_loadLotus` hub XZ + Y on chassis bbox. */
      function placeLotusWheelsFromPlayMode() {
        if (!chassisMetrics || carWheels.length !== 4) return;
        const { cSize, cCenter, cMinY } = chassisMetrics;
        const lp = lotusWheelLayout;
        const halfTrack = cSize.z * lp.trackWidth;
        const halfWB = cSize.x * lp.wheelbase;
        const wheelYOff = cMinY + cSize.y * lp.wheelY;
        const wbShift = cSize.x * lp.wbShift;
        hubLocalY = wheelYOff;

        const layout = [
          { x: halfWB + wbShift, z: -halfTrack, steer: true, name: "FL" },
          { x: halfWB + wbShift, z: halfTrack, steer: true, name: "FR" },
          { x: -halfWB + wbShift, z: -halfTrack, steer: false, name: "RL" },
          { x: -halfWB + wbShift, z: halfTrack, steer: false, name: "RR" },
        ];

        for (let i = 0; i < 4; i++) {
          const w = carWheels[i];
          const L = layout[i];
          w.steer = L.steer;
          w.isLeft = L.z < 0;
          w.name = L.name;
          w.container.rotation.set(
            0,
            CAR_MODEL_YAW + (w.isLeft ? 0 : Math.PI),
            0,
          );
          w.container.position.set(cCenter.x + L.x, wheelYOff, cCenter.z + L.z);
          w.offset.set(cCenter.x + L.x, 0, cCenter.z + L.z);
        }

        const fl = carWheels[0].offset;
        const fr = carWheels[1].offset;
        const rl = carWheels[2].offset;
        chassisMetrics.terrainTrackSpan = Math.abs(fr.z - fl.z);
        chassisMetrics.terrainWBSpan = Math.abs(rl.x - fl.x);
        applyMeasuredPhysicsFromWheels();
        syncLotusHullFromCarBounds();
      }

      /**
       * Fit v2 compound hull (spheres + corner probes) to the loaded Lotus mesh.
       * Default lotusHull is narrower than lotusrealsize2.glb — corners clip through walls.
       */
      function syncLotusHullFromCarBounds() {
        if (
          !carRoot ||
          !carPhysics ||
          !chassisMetrics ||
          carWheels.length !== 4
        ) {
          return;
        }

        carRoot.updateMatrixWorld(true);
        _boxA.setFromObject(carRoot, true);

        const lh = carPhysics.lotusHull;
        const lc = carPhysics.lotusChassis;

        let maxFwd = 0;
        let maxRear = 0;
        let maxRight = 0;
        for (const w of carWheels) {
          const fx = w.offset.x;
          const fz = Math.abs(w.offset.z);
          if (fx > maxFwd) maxFwd = fx;
          if (-fx > maxRear) maxRear = -fx;
          if (fz > maxRight) maxRight = fz;
        }

        maxFwd = Math.max(maxFwd, _boxA.max.x);
        maxRear = Math.max(maxRear, -_boxA.min.x);
        maxRight = Math.max(
          maxRight,
          Math.abs(_boxA.min.z),
          Math.abs(_boxA.max.z),
        );

        lh.rideHeight = lc.rideHeight;
        lh.probeHalfLength = Math.max(maxFwd, maxRear) + 0.05;
        lh.probeHalfWidth = maxRight + 0.04;
        lh.probePenetrationSlack = 0.05;
        lh.collisionSkin = 0.03;
        lh.probeSearchRadius = Math.min(0.72, lh.probeHalfWidth + 0.14);
        lh.sweepFwdMargin = 0.22;

        const hullY = 0.28;
        const rMid = Math.min(0.42, lh.probeHalfLength * 0.22);
        const rSide = Math.min(0.36, lh.probeHalfWidth * 0.44);

        const spheres = [
          {
            fwd: maxFwd * 0.96,
            right: 0,
            y: hullY,
            r: rMid * 0.88,
            label: "front",
          },
          { fwd: 0, right: 0, y: hullY + 0.1, r: rMid, label: "cabin" },
          {
            fwd: -maxRear * 0.96,
            right: 0,
            y: hullY,
            r: rMid * 0.82,
            label: "rear",
          },
          {
            fwd: maxFwd * 0.78,
            right: maxRight * 0.94,
            y: hullY,
            r: rSide,
            label: "front-L",
          },
          {
            fwd: maxFwd * 0.78,
            right: -maxRight * 0.94,
            y: hullY,
            r: rSide,
            label: "front-R",
          },
          {
            fwd: -maxRear * 0.72,
            right: maxRight * 0.94,
            y: hullY,
            r: rSide * 0.95,
            label: "rear-L",
          },
          {
            fwd: -maxRear * 0.72,
            right: -maxRight * 0.94,
            y: hullY,
            r: rSide * 0.95,
            label: "rear-R",
          },
        ];
        lh.hullSpheres.length = 0;
        for (const s of spheres) lh.hullSpheres.push({ ...s });

        console.log("[circuit] Lotus collision hull synced to mesh", {
          probeHalfLength: lh.probeHalfLength.toFixed(3),
          probeHalfWidth: lh.probeHalfWidth.toFixed(3),
          maxFwd: maxFwd.toFixed(3),
          maxRear: maxRear.toFixed(3),
          maxRight: maxRight.toFixed(3),
          spheres: lh.hullSpheres.length,
        });
        if (hullDebugRoot) rebuildHullDebugSphereMeshes();
      }

      /** Console + `window.__lotusRigReport` for physics tuning later. */
      function logCarRigDiagnostics() {
        if (!carRoot || !chassisMetrics) {
          console.warn("[circuit] Rig log: car not loaded.");
          return null;
        }

        carRoot.updateMatrixWorld(true);
        const { cSize, cCenter, cMinY } = chassisMetrics;

        const rootBox = new THREE.Box3().setFromObject(carRoot, true);
        const rootSize = new THREE.Vector3();
        const rootCenter = new THREE.Vector3();
        rootBox.getSize(rootSize);
        rootBox.getCenter(rootCenter);

        const hy = carHeading - CAR_MODEL_YAW + Math.PI;
        const c = Math.cos(hy);
        const s = Math.sin(hy);

        const wheels = carWheels.map((w) => {
          w.container.updateMatrixWorld(true);
          const hubWorld = w.container.getWorldPosition(_v3a.clone());
          const spinBox = w.cylinder
            ? (() => {
                _boxA.setFromObject(w.cylinder, true);
                const sz = new THREE.Vector3();
                const cen = new THREE.Vector3();
                _boxA.getSize(sz);
                _boxA.getCenter(cen);
                return {
                  size: [sz.x, sz.y, sz.z],
                  centerWorld: [cen.x, cen.y, cen.z],
                };
              })()
            : null;

          const meshes = [];
          w.container.traverse((o) => {
            if (!o.isMesh) return;
            _boxA.setFromObject(o, true);
            const sz = new THREE.Vector3();
            const cen = new THREE.Vector3();
            _boxA.getSize(sz);
            _boxA.getCenter(cen);
            meshes.push({
              name: o.name,
              size: [sz.x, sz.y, sz.z],
              centerWorld: [cen.x, cen.y, cen.z],
            });
          });

          const lx = w.offset.x;
          const lz = w.offset.z;
          const hubFromOffset = _v3b.set(
            playerPos.x + lx * c + lz * s,
            playerPos.y,
            playerPos.z - lx * s + lz * c,
          );

          return {
            name: w.name,
            steer: w.steer,
            isLeft: w.isLeft,
            hubLocalY,
            offset: [w.offset.x, w.offset.y, w.offset.z],
            containerPos: [
              w.container.position.x,
              w.container.position.y,
              w.container.position.z,
            ],
            containerRotY: w.container.rotation.y,
            hubWorld: [hubWorld.x, hubWorld.y, hubWorld.z],
            hubFromOffset: [hubFromOffset.x, hubFromOffset.y, hubFromOffset.z],
            spinBox,
            meshes,
          };
        });

        const mp = applyMeasuredPhysicsFromWheels();
        const physicsRecommendations = {
          wheelBase: mp?.wheelBase ?? chassisMetrics.terrainWBSpan,
          track: mp?.track ?? chassisMetrics.terrainTrackSpan,
          rideHeight: mp?.rideHeight ?? physParams.rideHeight,
          wheelRadius: mp?.wheelRadius ?? physParams.wheelRadius,
          hubLocalY,
          groundOffset,
          hubs: Object.fromEntries(
            wheels.map((w) => [
              w.name,
              { x: w.offset[0], z: w.offset[2], y: w.containerPos[1] },
            ]),
          ),
        };

        const report = {
          glb: GLB_URL.split("/").pop(),
          rig: "chassis+wheelContainer (playMode _loadLotus)",
          lotusWheelLayout,
          chassis: {
            size: [cSize.x, cSize.y, cSize.z],
            center: [cCenter.x, cCenter.y, cCenter.z],
            minY: cMinY,
            terrainTrackSpan: chassisMetrics.terrainTrackSpan,
            terrainWBSpan: chassisMetrics.terrainWBSpan,
          },
          carRoot: {
            size: [rootSize.x, rootSize.y, rootSize.z],
            center: [rootCenter.x, rootCenter.y, rootCenter.z],
            minY: rootBox.min.y,
            position: [
              carRoot.position.x,
              carRoot.position.y,
              carRoot.position.z,
            ],
          },
          physicsRecommendations,
          wheels,
        };

        console.group("[circuit] Car rig diagnostics (for physics)");
        console.log("Full JSON: window.__lotusRigReport");
        const cx = chassisMetrics.cCenter.x;
        console.table(
          wheels.map((w) => ({
            wheel: w.name,
            offsetX: w.offset[0].toFixed(3),
            offsetZ: w.offset[2].toFixed(3),
            "|X−center|": Math.abs(w.offset[0] - cx).toFixed(3),
            hubY: w.containerPos[1].toFixed(3),
            isLeft: w.isLeft ? "L" : "R",
          })),
        );
        console.log(
          "Measured physics (applied to LotusPhysics GUI):",
          physicsRecommendations,
        );
        console.log(
          "Copy into lotusPhysics.js when wiring playMode:\n" +
            JSON.stringify(
              {
                wheelBase: physicsRecommendations.wheelBase,
                track: physicsRecommendations.track,
                rideHeight: physicsRecommendations.rideHeight,
                wheelRadius: physicsRecommendations.wheelRadius,
              },
              null,
              2,
            ),
        );
        console.log(report);
        console.groupEnd();

        window.__lotusRigReport = report;
        return report;
      }

      /** Derive wheelBase / track / rideHeight / radius from placed hubs (chassis-local). */
      function applyMeasuredPhysicsFromWheels() {
        const fl = carWheels.find((w) => w.name === "FL");
        const fr = carWheels.find((w) => w.name === "FR");
        const rl = carWheels.find((w) => w.name === "RL");
        if (!fl || !fr || !rl || !chassisMetrics) return null;

        const wheelBase = Math.hypot(
          rl.offset.x - fl.offset.x,
          rl.offset.z - fl.offset.z,
        );
        const track = Math.hypot(
          fr.offset.x - fl.offset.x,
          fr.offset.z - fl.offset.z,
        );
        const rideHeight = Math.max(0.05, hubLocalY - chassisMetrics.cMinY);

        let wheelRadius = physParams.wheelRadius;
        if (fl.cylinder) {
          _boxA.setFromObject(fl.cylinder, true);
          const sz = new THREE.Vector3();
          _boxA.getSize(sz);
          wheelRadius = Math.max(sz.y, sz.z) * 0.5;
        }

        physParams.wheelBase = wheelBase;
        physParams.track = track;
        physParams.rideHeight = rideHeight;
        physParams.wheelRadius = wheelRadius;
        syncCarPhysicsFromParams();

        chassisMetrics.measuredPhysics = {
          wheelBase,
          track,
          rideHeight,
          wheelRadius,
          hubLocalY,
        };

        return chassisMetrics.measuredPhysics;
      }

      /** Port of v2/play/playMode.js `_loadLotus` — real size (scale 1, no footprint normalize). */
      function buildCarFromGltf(gltf) {
        const src = gltf.scene;
        let chassisSrc = null;
        let wheelSrc = null;
        src.traverse((o) => {
          if (!chassisSrc && /^chassis(\.|\d|$)/.test(o.name)) chassisSrc = o;
          if (!wheelSrc && /^wheelContainer(\.|\d|$)/.test(o.name))
            wheelSrc = o;
        });
        if (!chassisSrc || !wheelSrc) {
          console.warn("[circuit] Missing chassis/wheelContainer.");
          if (!chassisSrc) chassisSrc = src;
          if (!wheelSrc) wheelSrc = src.clone(true);
        }

        // Measure where the wheel mesh actually sits inside the wheelContainer
        // (origin is not the hub center in lotusrealsize2.glb). Clone with an
        // identity transform, then take the cylinder/tyre bbox center.
        {
          const probe = wheelSrc.clone(true);
          probe.position.set(0, 0, 0);
          probe.rotation.set(0, 0, 0);
          probe.scale.set(1, 1, 1);
          probe.updateMatrixWorld(true);
          let cyl = null;
          probe.traverse((c) => {
            if (!cyl && /^wheelCylinder(\.|\d|$)/.test(c.name)) cyl = c;
          });
          if (!cyl) {
            probe.traverse((c) => {
              if (!cyl && c.isMesh && /TYRE|TIRE/i.test(c.name)) cyl = c;
            });
          }
          if (cyl) {
            const box = new THREE.Box3().setFromObject(cyl);
            box.getCenter(wheelContainerHubOffset);
          } else {
            wheelContainerHubOffset.set(0, 0, 0);
          }
          console.log(
            "[circuit] wheelContainer hub offset (container-local):",
            wheelContainerHubOffset.toArray().map((n) => n.toFixed(4)),
          );
        }

        const chassisVisual = chassisSrc.clone(true);
        chassisVisual.position.set(0, 0, 0);
        chassisVisual.rotation.set(0, CAR_MODEL_YAW, 0);
        chassisVisual.scale.setScalar(1);
        const strays = [];
        chassisVisual.traverse((o) => {
          if (/^wheelContainer(\.|\d|$)/.test(o.name)) strays.push(o);
          if (o.isMesh || o.isSkinnedMesh) {
            o.castShadow = true;
            o.receiveShadow = true;
          }
        });
        strays.forEach((s) => s.parent?.remove(s));

        carChassis = new THREE.Group();
        carChassis.rotation.order = "YXZ";
        carBodyPivot = new THREE.Group();
        carBodyPivot.rotation.order = "YXZ";
        carChassisVisual = chassisVisual;
        carBodyPivot.add(chassisVisual);
        carChassis.add(carBodyPivot);

        chassisVisual.updateMatrixWorld(true);
        const cBox = new THREE.Box3().setFromObject(chassisVisual);
        const cSize = new THREE.Vector3();
        const cCenter = new THREE.Vector3();
        cBox.getSize(cSize);
        cBox.getCenter(cCenter);
        chassisMetrics = {
          cSize,
          cCenter,
          cMinY: cBox.min.y,
        };

        const layout = [
          { steer: true, name: "FL" },
          { steer: true, name: "FR" },
          { steer: false, name: "RL" },
          { steer: false, name: "RR" },
        ];

        carWheels = layout.map((w) => {
          const container = wheelSrc.clone(true);
          // The wheelContainer's Object3D hierarchy is all at (0,0,0); the
          // wheel/tyre/rotor mesh GEOMETRIES are baked with their centers at
          // +hubOffset from their parents' origins. That means container
          // origin ≠ wheel hub AND wheelCylinder origin ≠ wheel center.
          // Shifting every mesh.position by -hubOffset puts each mesh's
          // geometry center at its parent's origin, which:
          //   1. Places the wheel at the container origin (so steering
          //      pivots around the actual wheel center)
          //   2. Aligns wheelCylinder's spin axis with the wheel's geometric
          //      center (so cylinder.rotation.x spins in place, not orbits)
          //   3. Keeps the brake caliper at its correct offset relative to
          //      the wheel (sibling shifts together)
          let suspension = null;
          let cylinder = null;
          container.traverse((c) => {
            if (!suspension && /^wheelSuspension(\.|\d|$)/.test(c.name))
              suspension = c;
            if (!cylinder && /^wheelCylinder(\.|\d|$)/.test(c.name))
              cylinder = c;
            if (c.isMesh || c.isSkinnedMesh) {
              c.position.sub(wheelContainerHubOffset);
              c.castShadow = true;
              c.receiveShadow = true;
            }
          });
          carChassis.add(container);
          return {
            container,
            suspension: suspension || container,
            cylinder: cylinder || container,
            offset: new THREE.Vector3(),
            steer: w.steer,
            isLeft: false,
            name: w.name,
          };
        });

        placeLotusWheelsFromPlayMode();

        carRoot = new THREE.Group();
        carRoot.rotation.order = "YXZ";
        carRoot.scale.setScalar(CAR_MODEL_SCALE);
        carRoot.add(carChassis);

        carRoot.updateMatrixWorld(true);
        const groundBox = new THREE.Box3().setFromObject(carRoot, true);
        groundOffset = -groundBox.min.y;

        console.log(
          "[circuit] Lotus loaded (playMode _loadLotus, scale",
          CAR_MODEL_SCALE,
          ") —",
          cSize.x.toFixed(2),
          "×",
          cSize.z.toFixed(2),
          "×",
          cSize.y.toFixed(2),
          "m",
        );

        requestAnimationFrame(() => logCarRigDiagnostics());
        return carRoot;
      }

      /** Drop spawn onto ground below — bounded ray like v2 playMode (not Y=∞). */
      function sampleSpawnFloorY(x, z) {
        if (!cliffBvh.baked) return null;
        const fromY = 2.5;
        const bvhY = cliffBvh.raycastHeightFrom(x, fromY, z);
        if (bvhY != null && bvhY <= fromY) return bvhY;
        return terrainStore.getWorldHeight(x, z);
      }

      function respawn() {
        let spawnY = SPAWN.y;
        const floorY = sampleSpawnFloorY(SPAWN.x, SPAWN.z);
        if (floorY != null) spawnY = floorY;
        state.pos.set(SPAWN.x, spawnY, SPAWN.z);
        state.vel.set(0, 0, 0);
        state.yaw = SPAWN.heading;
        state.yawRate = 0;
        state.terrainPitch = state.terrainRoll = 0;
        state._visTerrainPitch = state._visTerrainRoll = 0;
        state.dynPitch = state.dynRoll = 0;
        state.steerVisual = 0;
        state.boostBlend = 0;
        _handbrakeBlend = 0;
        state.wheelSpin = 0;
        state.grounded = true;
        state.airTimer = 0;
        state.driftAngle = 0;
        state.carDrifting = false;
        carPhysics.velY = 0;
        carPhysics.inAir = false;
        carPhysics._initialized = false;
        driftMarks.reset();
        carHeading = state.yaw;
        camYaw = carHeading;
      }

      const _fwd = new THREE.Vector3();
      const _right = new THREE.Vector3();
      const _horizVel = new THREE.Vector3();
      const _hubLocal = new THREE.Vector3();
      const _quatChassis = new THREE.Quaternion();
      const _eulerChassis = new THREE.Euler(0, 0, 0, "YXZ");
      /** Flat [FLx,FLz, FRx,FRz, RLx,RLz, RRx,RRz] — fed to CarPhysics.updateSuspension. */
      const _wheelWorldXZs = new Float32Array(8);

      function stepSimulation(dtSec) {
        // ---------- input ----------
        const forward = !!(keysHeld.KeyW || keysHeld.ArrowUp);
        const backward = !!(keysHeld.KeyS || keysHeld.ArrowDown);
        const leftKey = !!(keysHeld.KeyA || keysHeld.ArrowLeft);
        const rightKey = !!(keysHeld.KeyD || keysHeld.ArrowRight);
        const handbrake = !!keysHeld.Space;
        const boostKeys = !!(keysHeld.ShiftLeft || keysHeld.ShiftRight);

        const layout = wheelLayoutLocal();
        updateLotusHy(state.yaw);

        // Arcade drive uses LAST FRAME's grounded — same as v2 playMode, where
        // updateSuspension runs after movement and ground state lags one frame.
        const grounded = state.grounded;

        // ---------- arcade drive (v2 LotusPhysics — Space + steer = spin / 360) ----------
        const steerInput = (leftKey ? 1 : 0) - (rightKey ? 1 : 0);
        const hx = -Math.sin(state.yaw);
        const hz = -Math.cos(state.yaw);
        const rx = Math.cos(state.yaw);
        const rz = -Math.sin(state.yaw);

        let vx = state.vel.x;
        let vz = state.vel.z;
        let speed = Math.hypot(vx, vz);

        state.boostBlend +=
          (boostKeys ? 1 - state.boostBlend : -state.boostBlend) *
          (1 - Math.exp(-12 * dtSec));
        const accelBase = THREE.MathUtils.lerp(
          physParams.accel,
          physParams.accelBoost,
          state.boostBlend,
        );
        let throttleAccel = 0;

        if (grounded) {
          let accel = accelBase;
          if (!boostKeys) {
            const speedKmh = speed * 3.6;
            const rampT = THREE.MathUtils.smoothstep(
              speedKmh,
              0,
