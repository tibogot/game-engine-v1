              physParams.baseAccelRampToKmh,
            );
            accel *= THREE.MathUtils.lerp(
              physParams.baseAccelLowSpeedMul,
              1,
              rampT,
            );
          }

          if (forward) {
            vx += hx * accel * dtSec;
            vz += hz * accel * dtSec;
            throttleAccel = accel;
          } else if (backward) {
            if (speed > 1) {
              vx -= hx * physParams.brake * dtSec;
              vz -= hz * physParams.brake * dtSec;
              throttleAccel = -physParams.brake;
            } else {
              vx -= hx * physParams.reverseAccel * dtSec;
              vz -= hz * physParams.reverseAccel * dtSec;
              throttleAccel = -physParams.reverseAccel;
            }
          } else if (speed > 0.05) {
            const decel = physParams.coast / speed;
            vx -= vx * decel * dtSec;
            vz -= vz * decel * dtSec;
          } else {
            vx = 0;
            vz = 0;
          }

          if (handbrake && speed > 0.1) {
            const hb = physParams.handbrakeDecel / speed;
            vx -= vx * hb * dtSec;
            vz -= vz * hb * dtSec;
          }

          const speed2 = vx * vx + vz * vz;
          if (speed2 > 0.01) {
            const spd = Math.sqrt(speed2);
            const factor = Math.max(0, 1 - physParams.drag * spd * dtSec);
            vx *= factor;
            vz *= factor;
          }

          const maxSpd = THREE.MathUtils.lerp(
            physParams.maxSpeed,
            physParams.maxSpeedBoost,
            state.boostBlend,
          );
          speed = Math.hypot(vx, vz);
          if (speed > maxSpd) {
            const s = maxSpd / speed;
            vx *= s;
            vz *= s;
            speed = maxSpd;
          }

          const fwdDot = vx * hx + vz * hz;
          let latDot = vx * rx + vz * rz;

          let speedGrip = Math.max(
            physParams.gripMinSpeed,
            physParams.gripBase - speed * physParams.gripSpeedDecay,
          );
          if (
            handbrake &&
            speed > physParams.driftEntrySpeed &&
            steerInput !== 0
          ) {
            _handbrakeBlend +=
              (1 - _handbrakeBlend) *
              (1 - Math.exp(-physParams.gripHandbrakeApplyRate * dtSec));
          } else {
            _handbrakeBlend +=
              (0 - _handbrakeBlend) *
              (1 - Math.exp(-physParams.gripRecoveryRate * dtSec));
          }
          let grip =
            speedGrip +
            (physParams.gripHandbrake - speedGrip) * _handbrakeBlend;

          const driftDir = Math.sign(latDot);
          const isCounterSteering =
            state.carDrifting &&
            driftDir !== 0 &&
            steerInput !== 0 &&
            Math.sign(steerInput) !== driftDir;
          if (isCounterSteering) {
            const counterStrength = Math.min(
              1,
              Math.abs(state.driftAngle) / 0.5,
            );
            grip += physParams.gripCounterBonus * counterStrength;
          }
          if (backward && steerInput !== 0 && speed > 3) {
            grip = Math.min(grip, physParams.gripBrakeTurn);
          }

          // Load-modulated grip: real tire grip = μ·Fn. totalSpringForce/weight
          // gives the actual normal-load fraction (≈1 at equilibrium, ≈0 mid-air,
          // briefly >1 on landing). `gripLoadCoupling` lerps to old body-level
          // behavior so the GUI slider gives an A/B compare.
          const _w = carPhysics.telemetry.weight;
          const _Ft = carPhysics.telemetry.totalSpringForce;
          let _loadFactor;
          if (!state.grounded) {
            _loadFactor = 0;
          } else if (_w > 1e-3) {
            _loadFactor = Math.min(
              physParams.gripLoadMax,
              Math.max(0, _Ft / _w),
            );
          } else {
            _loadFactor = 1;
          }
          const _loadMix = 1 + (_loadFactor - 1) * physParams.gripLoadCoupling;
          grip *= _loadMix;

          const lateralKill = 1 - Math.exp(-grip * dtSec);
          vx -= rx * latDot * lateralKill;
          vz -= rz * latDot * lateralKill;

          if (steerInput !== 0 && speed > 0.5) {
            let turnRate = physParams.turnRate;
            if (_handbrakeBlend > 0.2) {
              turnRate = THREE.MathUtils.lerp(
                turnRate,
                state.carDrifting && isCounterSteering
                  ? physParams.turnRateCounter
                  : physParams.turnRateDrift,
                _handbrakeBlend,
              );
            }
            state.yaw += steerInput * turnRate * dtSec;
            state.yawRate = steerInput * turnRate;
          } else {
            state.yawRate = 0;
          }
          carHeading = state.yaw;

          const updatedLatDot = vx * rx + vz * rz;
          state.driftAngle =
            speed > 1
              ? Math.abs(Math.atan2(updatedLatDot, Math.abs(fwdDot)))
              : 0;
          const hbDrift =
            handbrake && speed > physParams.driftEntrySpeed && steerInput !== 0;
          const slipDrift =
            state.driftAngle > physParams.driftAngleMin &&
            speed > physParams.driftEntrySpeed;
          if (physParams.driftRequiresHandbrake) {
            if (!state.carDrifting) {
              state.carDrifting =
                hbDrift && slipDrift && _handbrakeBlend > 0.35;
            } else {
              state.carDrifting =
                _handbrakeBlend > 0.12 &&
                state.driftAngle > physParams.driftAngleExit &&
                speed > physParams.driftEntrySpeed * 0.5;
            }
          } else if (!state.carDrifting) {
            state.carDrifting = slipDrift;
          } else {
            state.carDrifting =
              state.driftAngle > physParams.driftAngleExit &&
              speed > physParams.driftEntrySpeed * 0.5;
          }

          state.vel.x = vx;
          state.vel.z = vz;
        } else {
          const airDrag = physParams.airDrag;
          if (speed > 0.01) {
            const factor = Math.max(0, 1 - airDrag * dtSec);
            state.vel.x *= factor;
            state.vel.z *= factor;
          }
          state.driftAngle = 0;
          state.carDrifting = false;
          state.yawRate = 0;
          _handbrakeBlend = 0;
        }

        state.steerVisual = THREE.MathUtils.lerp(
          state.steerVisual,
          steerInput * physParams.steerVisualMax,
          1 - Math.exp(-14 * dtSec),
        );

        lotusDriveBasis(state.yaw, _fwd, _right);
        _horizVel.set(state.vel.x, 0, state.vel.z);
        const vF = _horizVel.dot(_fwd);
        speed = _horizVel.length();

        // ---------- horizontal motion + collision (v2 hull sweep + probes) ----------
        const stepX = state.vel.x * dtSec;
        const stepZ = state.vel.z * dtSec;
        const resolved = carPhysics.resolveMovement(
          state.pos.x,
          state.pos.z,
          stepX,
          stepZ,
          state.pos.y,
          state.yaw,
          state.vel.x,
          state.vel.z,
          cliffBvh,
          CAR_MODEL_SCALE,
          carPhysics.lotusHull,
        );
        state.pos.x = THREE.MathUtils.clamp(
          resolved.x,
          -WORLD_LIMIT,
          WORLD_LIMIT,
        );
        state.pos.z = THREE.MathUtils.clamp(
          resolved.z,
          -WORLD_LIMIT,
          WORLD_LIMIT,
        );
        state.vel.x = resolved.vx;
        state.vel.z = resolved.vz;

        // ---------- vertical motion + suspension + slope slide (v2 CarPhysics) ----------
        // Wheel hub world XZ — chassis-local layout rotated by current pose,
        // sampled at the post-move position so suspension sees the surface
        // the car is actually about to land on.
        for (let i = 0; i < 4; i++) {
          const L = layout[i];
          const hub = wheelHubWorldXZ(
            state.pos.x,
            state.pos.z,
            L.x,
            L.z,
            hubLocalY,
            state.terrainPitch,
            state.terrainRoll,
          );
          _wheelWorldXZs[i * 2] = hub.x;
          _wheelWorldXZs[i * 2 + 1] = hub.z;
        }
        carPhysics.inAir = !state.grounded;
        carPhysics.velY = state.vel.y;
        const vert = carPhysics.updateSuspension(
          state.pos.y,
          _wheelWorldXZs,
          CAR_MODEL_SCALE,
          state.yaw,
          dtSec,
          terrainStore.getWorldHeight,
          cliffBvh,
          state.vel.x,
          state.vel.z,
          false,
          carPhysics.lotusChassis,
        );
        state.pos.y = vert.y;
        state.vel.y = carPhysics.velY;
        state.grounded = !carPhysics.inAir;
        // Rest snap: kills underdamped suspension ring on flat ground. Only
        // engages when fully grounded, no jump request, and velY tiny — so
        // it never interferes with real motion (jumps, slopes, landings).
        if (
          state.grounded &&
          carPhysics.telemetry.groundedCount === 4 &&
          Math.abs(state.vel.y) < physParams.velYRestSnap
        ) {
          state.vel.y = 0;
          carPhysics.velY = 0;
        }
        state.airTimer = state.grounded ? 0 : state.airTimer + dtSec;
        for (let i = 0; i < 4; i++) {
          state.wheelHit[i] = carPhysics.wheelGrounded[i];
          state.wheelContactY[i] = carPhysics.wheelContactYs[i];
        }
        if (vert.slideVx || vert.slideVz) {
          state.vel.x += vert.slideVx;
          state.vel.z += vert.slideVz;
        }

        // Smooth chassis tilt — on ground follow surface; in air nose tracks velocity arc.
        const terrainSm = 1 - Math.exp(-physParams.pitchSmooth * dtSec);
        if (state.grounded) {
          state.terrainPitch +=
            (vert.terrainPitch - state.terrainPitch) * terrainSm;
          state.terrainRoll +=
            (vert.terrainRoll - state.terrainRoll) * terrainSm;
        } else {
          const airSm =
            1 - Math.exp(-carPhysics.lotusChassis.airPitchSmooth * dtSec);
          state.terrainPitch +=
            (carPhysics.airPitch - state.terrainPitch) * airSm;
          state.terrainRoll += (0 - state.terrainRoll) * terrainSm;
        }

        // ---------- dynamic chassis pitch (squat/dive) + roll (cornering lean) ----------
        // v2 lotusPhysics-style cosmetic tilt — small fixed angles, not full accel scale.
        const speedNorm = Math.min(1, speed / Math.max(1, physParams.maxSpeed));
        const throttlePitch =
          forward && !backward ? -0.035 : backward && !forward ? 0.045 : 0;
        const speedPitch = -speedNorm * 0.028;
        const dynPitchT = THREE.MathUtils.clamp(
          speedPitch + throttlePitch,
          -physParams.dynPitchMax,
          physParams.dynPitchMax,
        );
        const latForRoll =
          state.vel.x * Math.cos(state.yaw) +
          state.vel.z * -Math.sin(state.yaw);
        const driftRollSpeedGain = THREE.MathUtils.smoothstep(speed, 10, 24);
        let dynRollT = 0;
        if (state.carDrifting && _handbrakeBlend > 0.25) {
          dynRollT =
            -Math.sign(latForRoll) *
            Math.min(physParams.dynRollMax, state.driftAngle * 0.7) *
            driftRollSpeedGain *
            _handbrakeBlend;
        } else if (speed > 4 && Math.abs(latForRoll) > 0.5) {
          dynRollT = THREE.MathUtils.clamp(
            -Math.sign(latForRoll) *
              Math.min(physParams.cornerLeanMax, Math.abs(latForRoll) * 0.012),
            -physParams.cornerLeanMax,
            physParams.cornerLeanMax,
          );
        }
        const dynPitchSm = 1 - Math.exp(-physParams.dynPitchSmooth * dtSec);
        const dynRollSm = 1 - Math.exp(-physParams.dynRollSmooth * dtSec);
        state.dynPitch += (dynPitchT - state.dynPitch) * dynPitchSm;
        state.dynRoll += (dynRollT - state.dynRoll) * dynRollSm;

        // ---------- wheel spin (visual) ----------
        state.wheelSpin += (vF / Math.max(physParams.wheelRadius, 0.1)) * dtSec;

        syncCarVisuals(dtSec);
      }

      const _desiredHubWorld = new THREE.Vector3();
      const _invChassisMat = new THREE.Matrix4();

      /** Live pitch/roll from this frame's wheel contact Ys — matches wheel snap geometry. */
      function instantTerrainPoseFromWheelContacts() {
        const y = state.wheelContactY;
        const wb = Math.max(0.5, physParams.wheelBase);
        const tr = Math.max(0.3, physParams.track);
        const frontAvg = (y[0] + y[1]) * 0.5;
        const rearAvg = (y[2] + y[3]) * 0.5;
        const leftAvg = (y[0] + y[2]) * 0.5;
        const rightAvg = (y[1] + y[3]) * 0.5;
        return {
          pitch: Math.atan2(frontAvg - rearAvg, wb),
          roll: Math.atan2(rightAvg - leftAvg, tr),
        };
      }

      function resolveVisualTerrainPose(
        dtSec,
        inAir,
        onRamp,
        contactSpan,
        speed,
      ) {
        const tiltMax = onRamp
          ? Math.max(physParams.chassisTiltMax, 0.95)
          : physParams.chassisTiltMax;
        if (inAir) {
          return {
            pitch: THREE.MathUtils.clamp(state.terrainPitch, -tiltMax, tiltMax),
            roll: THREE.MathUtils.clamp(state.terrainRoll, -tiltMax, tiltMax),
          };
        }
        if (state._visTerrainPitch === undefined) {
          state._visTerrainPitch = state.terrainPitch;
          state._visTerrainRoll = state.terrainRoll;
        }
        const instant = instantTerrainPoseFromWheelContacts();
        const fastRamp = onRamp && speed > 7;
        if (fastRamp) {
          state._visTerrainPitch = instant.pitch;
          state._visTerrainRoll = instant.roll;
        } else {
          const pitchRate = onRamp
            ? physParams.pitchSmooth * (contactSpan > 0.08 ? 6.5 : 4.5)
            : physParams.pitchSmooth;
          const targetP = onRamp ? instant.pitch : state.terrainPitch;
          const targetR = onRamp ? instant.roll : state.terrainRoll;
          if (onRamp && Math.abs(targetP - state._visTerrainPitch) > 0.02) {
            state._visTerrainPitch = targetP;
            state._visTerrainRoll = targetR;
          } else {
            const sm = 1 - Math.exp(-pitchRate * dtSec);
            state._visTerrainPitch += (targetP - state._visTerrainPitch) * sm;
            state._visTerrainRoll += (targetR - state._visTerrainRoll) * sm;
          }
        }
        return {
          pitch: THREE.MathUtils.clamp(
            state._visTerrainPitch,
            -tiltMax,
            tiltMax,
          ),
          roll: THREE.MathUtils.clamp(state._visTerrainRoll, -tiltMax, tiltMax),
        };
      }

      function syncCarVisuals(dtSec) {
        if (!carRoot || !carChassis || !carWheels.length) return;

        const hy = state.yaw - CAR_MODEL_YAW + Math.PI;
        carRoot.rotation.y = hy;

        const lc = carPhysics.lotusChassis;
        const suspMax = lc.suspMaxTravel;
        const hubRef = hubLocalY;
        const wheelR = physParams.wheelRadius;
        const inAir = !state.grounded;
        const rootY = state.pos.y + groundOffset;
        const speed = Math.hypot(state.vel.x, state.vel.z);

        carRoot.position.set(state.pos.x, rootY, state.pos.z);

        let contactMin = Infinity;
        let contactMax = -Infinity;
        for (let i = 0; i < 4; i++) {
          const cy = state.wheelContactY[i];
          if (cy < contactMin) contactMin = cy;
          if (cy > contactMax) contactMax = cy;
        }
        const contactSpan =
          contactMax > -Infinity ? contactMax - contactMin : 0;
        const frontContactAvg =
          (state.wheelContactY[0] + state.wheelContactY[1]) * 0.5;
        const rearContactAvg =
          (state.wheelContactY[2] + state.wheelContactY[3]) * 0.5;
        const frontRise = frontContactAvg - rearContactAvg;
        const onRamp = contactSpan > 0.035 || (!inAir && frontRise > 0.022);

        const { pitch: terrainPitch, roll: terrainRoll } =
          resolveVisualTerrainPose(dtSec, inAir, onRamp, contactSpan, speed);
        const dynSuppress = inAir
          ? 0
          : THREE.MathUtils.clamp(contactSpan / 0.04 + frontRise / 0.05, 0, 1);
        const dynPitch = THREE.MathUtils.clamp(
          state.dynPitch * (1 - dynSuppress),
          -physParams.dynPitchMax,
          physParams.dynPitchMax,
        );
        const dynRoll = THREE.MathUtils.clamp(
          state.dynRoll * (1 - dynSuppress * 0.85),
          -physParams.dynRollMax,
          physParams.dynRollMax,
        );

        // Terrain on chassis (wheels). Squat/dive on body pivot — same YXZ axes as terrain.
        carChassis.rotation.set(-terrainRoll, 0, terrainPitch);
        if (carBodyPivot) {
          carBodyPivot.rotation.set(-dynRoll, 0, dynPitch);
        }
        if (carChassisVisual) {
          carChassisVisual.rotation.set(0, CAR_MODEL_YAW, 0);
        }

        carChassis.updateMatrixWorld(true);

        /** Contact-snapped hub local Y per wheel (clamped + unclamped for body drop). */
        const rawWheelLocalY = new Array(carWheels.length);
        const rawWheelSnapY = new Array(carWheels.length);
        for (let i = 0; i < carWheels.length; i++) {
          const w = carWheels[i];
          if (inAir) {
            rawWheelLocalY[i] = hubRef;
            rawWheelSnapY[i] = hubRef;
            continue;
          }
          const hubXZ = wheelHubWorldXZ(
            state.pos.x,
            state.pos.z,
            w.offset.x,
            w.offset.z,
            hubRef,
            terrainPitch,
            terrainRoll,
          );
          _desiredHubWorld.set(
            hubXZ.x,
            state.wheelContactY[i] + wheelR,
            hubXZ.z,
          );
          _invChassisMat.copy(carChassis.matrixWorld).invert();
          _desiredHubWorld.applyMatrix4(_invChassisMat);
          const snapLocalY = _desiredHubWorld.y;
          rawWheelSnapY[i] = snapLocalY;
          rawWheelLocalY[i] = THREE.MathUtils.clamp(
            snapLocalY,
            hubRef - suspMax,
            hubRef + suspMax,
          );
        }

        // Drop the body pivot (not wheels) to match how far wheels extended downward.
        let bodyDropTarget = 0;
        if (!inAir && onRamp && carBodyPivot) {
          for (let i = 0; i < rawWheelSnapY.length; i++) {
            bodyDropTarget = Math.min(
              bodyDropTarget,
              rawWheelSnapY[i] - hubRef,
            );
          }
          bodyDropTarget = Math.max(bodyDropTarget, -suspMax * 1.15);
        }
        if (carBodyPivot) {
          if (carBodyPivot._smoothBodyDrop === undefined) {
            carBodyPivot._smoothBodyDrop = 0;
          }
          const bodyDropDelta = bodyDropTarget - carBodyPivot._smoothBodyDrop;
          if (
            onRamp &&
            (Math.abs(bodyDropDelta) > suspMax * 0.06 || speed > 7)
          ) {
            carBodyPivot._smoothBodyDrop = bodyDropTarget;
          } else {
            const bodyDropSm = onRamp
              ? Math.min(1, 55 * dtSec)
              : Math.min(1, 25 * dtSec);
            carBodyPivot._smoothBodyDrop += bodyDropDelta * bodyDropSm;
          }
          carBodyPivot.position.y = carBodyPivot._smoothBodyDrop;
        }
        if (carChassisVisual) {
          carChassisVisual.position.y = physParams.chassisVisualLift;
        }

        for (let i = 0; i < carWheels.length; i++) {
          const w = carWheels[i];
          const targetLocalY = inAir ? hubRef : rawWheelLocalY[i];
          if (w._smoothLocalY === undefined) w._smoothLocalY = hubRef;
          const wheelSm =
            onRamp && speed > 7
              ? 1
              : onRamp
                ? Math.min(1, 42 * dtSec)
                : Math.min(1, 25 * dtSec);
          w._smoothLocalY += (targetLocalY - w._smoothLocalY) * wheelSm;
          w.container.position.set(w.offset.x, w._smoothLocalY, w.offset.z);
          w.container.rotation.y =
            CAR_MODEL_YAW +
            (w.isLeft ? 0 : Math.PI) +
            (w.steer ? state.steerVisual : 0);
          if (w.cylinder) {
            w.cylinder.rotation.x = (w.isLeft ? 1 : -1) * state.wheelSpin;
            w.cylinder.rotation.z = 0;
          }
        }
      }

      function updateDriftMarksAndAudio(dtSec) {
        if (!carRoot || !carWheels.length) {
          driftMarks.update(_rearContactPts, false, 0);
          carAudio?.update(dtSec);
          return;
        }
        updateLotusHy(state.yaw);
        let rearIdx = 0;
        for (let i = 0; i < carWheels.length; i++) {
          const w = carWheels[i];
          if (w.steer) continue;
          const hub = wheelHubWorldXZ(
            state.pos.x,
            state.pos.z,
            w.offset.x,
            w.offset.z,
            hubLocalY,
            state.terrainPitch + state.dynPitch,
            state.terrainRoll + state.dynRoll,
          );
          const y =
            (state.wheelHit[i] ? state.wheelContactY[i] : state.pos.y) +
            DRIFT_MARK_Y_OFFSET;
          _rearContactPts[rearIdx].set(hub.x, y, hub.z);
          _rearContactGrounded[rearIdx] = state.wheelHit[i];
          rearIdx++;
        }
        const speed = Math.hypot(state.vel.x, state.vel.z);
        const handbrake = !!keysHeld.Space;
        const driftAmount = THREE.MathUtils.clamp(
          (state.driftAngle - DRIFT_ANGLE_MIN) / 0.5,
          0,
          1,
        );
        const handbrakeAmount = handbrake
          ? THREE.MathUtils.smoothstep(
              speed,
              physParams.driftEntrySpeed,
              physParams.driftEntrySpeed * 2.2,
            )
          : 0;
        const driftIntensity = Math.max(driftAmount, handbrakeAmount);
        const emitMarks =
          state.grounded &&
          speed > physParams.driftEntrySpeed &&
          driftIntensity > DRIFT_MARK_INTENSITY_MIN;
        driftMarks.update(
          _rearContactPts,
          emitMarks,
          driftIntensity,
          _rearContactGrounded,
        );
        carAudio?.update(dtSec);
      }

        const vy = state.vel.y;
        hudEl.innerHTML = [
          `<div><strong>Speed</strong> ${spdH.toFixed(0)} km/h · <strong>vY</strong> ${vy.toFixed(1)} m/s</div>`,
          `<div><strong>${state.grounded ? "GROUND" : "AIR"}</strong>${state.grounded ? "" : ` (${state.airTimer.toFixed(2)}s)`} · alt ${state.pos.y.toFixed(2)} m</div>`,
          `<div style="opacity:0.75">Pitch ${(state.terrainPitch * 57.3).toFixed(1)}° · Roll ${(state.terrainRoll * 57.3).toFixed(1)}°${carPhysics.onSteepSlope ? " · STEEP" : ""}</div>`,
        ].join("");
      }

      function updateCamera(dtSec) {
        if (orbitInspect) {
          controls.target.set(playerPos.x, playerPos.y + 1.2, playerPos.z);
          controls.update();
          return;
        }

        const chaseTarget = carHeading;
        let d = chaseTarget - camYaw;
        while (d > Math.PI) d -= 2 * Math.PI;
        while (d < -Math.PI) d += 2 * Math.PI;
        camYaw += d * (1 - Math.exp(-cam.chaseSpeed * dtSec));

        const dist = cam.distance;
        const lookY = playerPos.y + cam.lookAtY;
        // Behind the car (same as playMode lotus / Bruno chase cam).
        camera.position.set(
          playerPos.x + Math.sin(camYaw) * dist,
          lookY + cam.height,
          playerPos.z + Math.cos(camYaw) * dist,
        );
        camera.lookAt(playerPos.x, lookY, playerPos.z);
        camera.fov = cam.fov;
        camera.updateProjectionMatrix();
      }

      const gltfLoader = new GLTFLoader();

      async function boot() {
        await renderer.init();
        rebuildEnvFromSky();
        buildCircuit();
        rebakePlayerBvh();
        console.log(
          "[circuit] CliffBvh baked:",
          cliffBvh.baked,
          colliders.length,
          "root colliders (children traversed recursively)",
        );

        gltfLoader.load(
          GLB_URL,
          (gltf) => {
            carRoot = buildCarFromGltf(gltf);
            scene.add(carRoot);
            syncCarPhysicsFromParams();
            respawn();
            setupGui();
            hudEl.textContent =
              "North: slope lab · West/East: straight/curved bridges · South: jump ramp";
            window.__lotusDbg = {
              camera,
              controls,
              scene,
              carRoot,
              state,
              physParams,
              cliffBvh,
              carPhysics,
              rebakePlayerBvh,
              parkourDebug,
              setParkourGroupEnabled,
              setAllParkourGroupsEnabled,
              setOrbit: (v) => {
                orbitInspect = v;
                controls.enabled = v;
              },
            };
          },
          undefined,
          (err) => {
            console.error(err);
            hudEl.textContent = "GLB load failed — use a local HTTP server";
          },
        );

        renderer.setAnimationLoop(() => {
          timer.update();
          const dtSec = Math.min(timer.getDelta() || 1 / 60, 0.05);

          sun.target.position.set(playerPos.x, 0, playerPos.z);
          sun.position.copy(sunVec).multiplyScalar(80).add(sun.target.position);

          if (carRoot && carWheels.length) {
            stepSimulation(dtSec);
          } else if (carRoot) {
            syncCarVisuals(dtSec);
          }

          updateCamera(dtSec);
          updateDriftMarksAndAudio(dtSec);
          updateHullDebugVisuals();
          updateHud();
          renderer.render(scene, camera);
        });
      }

      boot().catch((err) => {
        console.error(err);
        hudEl.textContent = "WebGPU init failed — use Chrome/Edge over HTTP";
      });
